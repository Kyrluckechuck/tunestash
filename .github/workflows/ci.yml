name: CI Optimized

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # Job 1: Backend tests (runs in parallel with frontend)
  # =============================================================================
  backend:
    name: Backend (lint + tests) • Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_spotify_library_manager
          POSTGRES_USER: slm_user
          POSTGRES_PASSWORD: slm_dev_password
        options: >-
          --health-cmd="pg_isready -U slm_user -d test_spotify_library_manager"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.13' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Collect static files
        working-directory: api
        run: python manage.py collectstatic --noinput || echo "Static file collection failed - continuing with tests"

      - name: Lint (backend)
        run: make lint-api

      - name: Tests (backend)
        env:
          DJANGO_SETTINGS_MODULE: test_settings
          TMPDIR: /tmp/pytest-${{ github.run_id }}-py${{ matrix.python-version }}
          HOME: /tmp/pytest-home-${{ github.run_id }}-py${{ matrix.python-version }}
        run: |
          mkdir -p "$TMPDIR" "$HOME"
          make test-api

  # =============================================================================
  # Job 2: Frontend tests (runs in parallel with backend)
  # =============================================================================
  frontend:
    name: Frontend (lint + tests) • Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint (frontend)
        working-directory: frontend
        run: yarn lint

      - name: Tests (frontend)
        working-directory: frontend
        run: yarn test:run

  # =============================================================================
  # Job 3: Code quality checks (runs in parallel)
  # =============================================================================
  code-quality:
    name: Code quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check trailing newlines
        run: python scripts/check-repo-newlines.py check

  # =============================================================================
  # Job 4: Docker build, test, and publish (runs after all tests pass)
  # =============================================================================
  docker-build-test-publish:
    name: Docker build, test, and publish
    runs-on: ubuntu-latest
    needs: [backend, frontend, code-quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create temp dirs for volumes
        id: mktemp
        run: |
          CONFIG_DIR="${RUNNER_TEMP}/slm_config"
          MUSIC_DIR="${RUNNER_TEMP}/slm_music"
          mkdir -p "$CONFIG_DIR/db" "$MUSIC_DIR"
          
          # Create minimal settings.yaml for CI
          cat > "$CONFIG_DIR/settings.yaml" << 'EOF'
          # Minimal CI configuration
          default:
            cookies_location: "/config/cookies.txt"
            final_path: "/mnt/music_spotify"
            ALBUM_TYPES_TO_DOWNLOAD:
              - single
              - album
              - compilation
            ALBUM_GROUPS_TO_IGNORE:
              - appears_on
          EOF
          
          echo "config-dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "music-dir=$MUSIC_DIR" >> "$GITHUB_OUTPUT"

      - name: Extract branch name
        id: branch
        run: |
          # Get branch name and make it safe for Docker tags
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH=${GITHUB_REF#refs/heads/}
          fi
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "name=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "original=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Build and push images with cache
        run: |
          # Determine if this is a main branch push or PR
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "🚀 Main branch push - building multi-arch images for production"
            PLATFORMS="linux/amd64,linux/arm64"
            BACKEND_TAGS="ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:latest,ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:sha-${{ github.sha }}"
            FRONTEND_TAGS="ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:latest,ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:sha-${{ github.sha }}"
            PUSH_FLAG="--push"
          else
            echo "🔨 PR - building multi-arch images for testing"
            PLATFORMS="linux/amd64,linux/arm64"
            # Use safe branch name for tags
            BRANCH_NAME="${{ steps.branch.outputs.name }}"
            BACKEND_TAGS="ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:$BRANCH_NAME,ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:sha-${{ github.sha }}"
            FRONTEND_TAGS="ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:$BRANCH_NAME,ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:sha-${{ github.sha }}"
            PUSH_FLAG="--push"
          fi
          
          echo "🔨 Building backend image with cache..."
          docker buildx build \
            --target backend-prod \
            --platform $PLATFORMS \
            --tag $BACKEND_TAGS \
            --cache-from type=gha,scope=backend-app \
            --cache-to type=gha,scope=backend-app,mode=max \
            $PUSH_FLAG \
            .
          
          echo "🔨 Building frontend image with cache..."
          docker buildx build \
            --target production \
            --platform $PLATFORMS \
            --tag $FRONTEND_TAGS \
            --cache-from type=gha,scope=frontend-app \
            --cache-to type=gha,scope=frontend-app,mode=max \
            $PUSH_FLAG \
            ./frontend
          
          echo "🏷️ Images built and pushed successfully"
          
          # For testing, also load images locally
          echo "📦 Loading images locally for testing..."
          docker buildx build \
            --target backend-prod \
            --tag local-backend:latest \
            --cache-from type=gha,scope=backend-app \
            --load \
            .
          
          docker buildx build \
            --target production \
            --tag local-frontend:latest \
            --cache-from type=gha,scope=frontend-app \
            --load \
            ./frontend
          
          echo "✅ Images ready for testing:"
          docker images | grep -E "(local-backend|local-frontend)"
          
          # Output image tags for reference
          echo "::notice title=Images Built::Backend: $BACKEND_TAGS"
          echo "::notice title=Images Built::Frontend: $FRONTEND_TAGS"
          echo "Built from branch: ${{ steps.branch.outputs.original }}"

      - name: Build and start stack
        env:
          SLM_CONFIG_DIR: ${{ steps.mktemp.outputs.config-dir }}
          MUSIC_DIR: ${{ steps.mktemp.outputs.music-dir }}
          BACKEND_IMAGE: local-backend:latest
          FRONTEND_IMAGE: local-frontend:latest
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: "django-insecure-ci-testing-key"
          AUTH_SECRET_KEY: "ci-testing-auth-key"
          POSTGRES_DB: "spotify_library_manager"
          POSTGRES_USER: "slm_user"
          POSTGRES_PASSWORD: "slm_dev_password"
        run: |
          echo "Using backend image: $BACKEND_IMAGE"
          echo "Using frontend image: $FRONTEND_IMAGE"
          echo "Config dir: $SLM_CONFIG_DIR"
          echo "Music dir: $MUSIC_DIR"
          
          echo "=== Creating required directories ==="
          mkdir -p "${SLM_CONFIG_DIR}/db/data"
          echo "✅ Created PostgreSQL data directory"
          
          echo "=== Starting PostgreSQL first ==="
          docker compose up -d postgres
          echo "⏰ Waiting for PostgreSQL to be healthy..."
          
          for i in {1..30}; do
            if docker compose ps postgres | grep -q "healthy"; then
              echo "✅ PostgreSQL is healthy after ${i} attempts"
              break
            fi
            echo "⏳ PostgreSQL not ready yet (attempt $i/30)..."
            if [ $i -eq 15 ]; then
              echo "=== PostgreSQL Debug Info ==="
              docker compose ps postgres
              docker compose logs postgres
            fi
            sleep 2
          done
          
          if ! docker compose ps postgres | grep -q "healthy"; then
            echo "❌ PostgreSQL never became healthy"
            echo "=== Final PostgreSQL Debug Info ==="
            docker compose ps postgres
            docker compose logs postgres
            exit 1
          fi
          
          echo "=== Starting web container ==="
          docker compose up -d web

          echo "⏰ Waiting for web container to become healthy..."
          for i in {1..30}; do
            if docker compose ps web --format json | jq -r '.Status' | grep -q "healthy"; then
              echo "✅ Web container is healthy after ${i} attempts"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Web container failed to become healthy after 30 attempts"
              echo "=== Container logs ==="
              docker compose logs web
              exit 1
            fi
            echo "⏳ Web container not ready yet (attempt $i/30)..."
            sleep 2
          done

          echo "=== Starting frontend container ==="
          docker compose up -d frontend

          echo "⏰ Waiting for frontend container to become healthy..."
          for i in {1..30}; do
            if docker compose ps frontend --format json | jq -r '.Status' | grep -q "healthy"; then
              echo "✅ Frontend container is healthy after ${i} attempts"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Frontend container failed to become healthy after 30 attempts"
              echo "=== Container logs ==="
              docker compose logs frontend
              exit 1
            fi
            echo "⏳ Frontend container not ready yet (attempt $i/30)..."
            sleep 2
          done

      - name: Test API health endpoint
        run: |
          echo "Testing API health endpoint..."
          if curl -f http://localhost:5000/healthz; then
            echo "✅ API health endpoint is responding"
          else
            echo "❌ API health endpoint failed"
            exit 1
          fi

      - name: Set up Node 20 for GraphQL validation
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies for validation
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Validate GraphQL schema and operations
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000/graphql
        run: yarn validate:comprehensive

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v

      - name: Cleanup old branch images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "🧹 Cleaning up images for merged/deleted branches..."
          
          # Function to cleanup old images for a given package
          cleanup_package() {
            local PACKAGE_NAME=$1
            local IMAGE_TYPE=$2
            
            echo "📦 Cleaning up $IMAGE_TYPE images for package: $PACKAGE_NAME"
            
            # Get all package versions
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/user/packages/container/$PACKAGE_NAME/versions" \
              --paginate > /tmp/all_versions.json
            
            # Get all current branch names from the repository
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/branches" \
              --jq '.[].name' > /tmp/current_branches.txt
            
            # Extract branch images from package versions (both branch-* and direct branch names)
            cat /tmp/all_versions.json | jq -r '
              .[] | 
              select(.metadata.container.tags[]? | test("^branch-") or (test("^[a-z0-9._-]+$") and (. != "latest"))) |
              .metadata.container.tags[] |
              select(test("^branch-") or (test("^[a-z0-9._-]+$") and (. != "latest"))) |
              if test("^branch-") then sub("^branch-"; "") else . end
            ' | sort | uniq > /tmp/image_branches.txt
            
            # Find branches that have images but no longer exist in the repo
            comm -23 /tmp/image_branches.txt /tmp/current_branches.txt > /tmp/deleted_branches.txt
            
            # Clean up images for deleted branches
            while IFS= read -r branch_name; do
              if [ -n "$branch_name" ]; then
                echo "🗑️ Cleaning up images for deleted branch: $branch_name"
                
                # Get all image IDs for this deleted branch (check both branch-* and direct branch names)
                cat /tmp/all_versions.json | jq -r --arg branch "$branch_name" '
                  .[] |
                  select(.metadata.container.tags[]? == $branch or .metadata.container.tags[]? == ("branch-" + $branch)) |
                  .id
                ' > /tmp/to_delete.txt
                
                # Delete all images for this deleted branch
                while IFS= read -r image_id; do
                  if [ -n "$image_id" ]; then
                    echo "  🗑️ Deleting image ID: $image_id"
                    gh api \
                      -X DELETE \
                      -H "Accept: application/vnd.github+json" \
                      -H "X-GitHub-Api-Version: 2022-11-28" \
                      "/user/packages/container/$PACKAGE_NAME/versions/$image_id" || echo "Failed to delete image $image_id"
                  fi
                done < /tmp/to_delete.txt
              fi
            done < /tmp/deleted_branches.txt
            
            # Also clean up old images for active branches (keep last 3)
            while IFS= read -r branch_name; do
              if [ -n "$branch_name" ]; then
                echo "🔍 Cleaning up old images for active branch: $branch_name (keeping last 3)"
                
                # Get image IDs for this branch, sorted by creation date (oldest first)
                cat /tmp/all_versions.json | jq -r --arg branch "$branch_name" '
                  .[] |
                  select(.metadata.container.tags[]? == $branch or .metadata.container.tags[]? == ("branch-" + $branch)) |
                  .id as $id |
                  .created_at as $date |
                  [$date, $id] |
                  @tsv
                ' | sort | head -n -3 | cut -f2 > /tmp/to_delete.txt
                
                # Delete old images for this active branch
                while IFS= read -r image_id; do
                  if [ -n "$image_id" ]; then
                    echo "  🗑️ Deleting old image ID: $image_id"
                    gh api \
                      -X DELETE \
                      -H "Accept: application/vnd.github+json" \
                      -H "X-GitHub-Api-Version: 2022-11-28" \
                      "/user/packages/container/$PACKAGE_NAME/versions/$image_id" || echo "Failed to delete image $image_id"
                  fi
                done < /tmp/to_delete.txt
              fi
            done < /tmp/current_branches.txt
            
            rm -f /tmp/all_versions.json /tmp/current_branches.txt /tmp/image_branches.txt /tmp/deleted_branches.txt /tmp/to_delete.txt
          }
          
          # Cleanup both backend and frontend packages
          cleanup_package "spotify-library-manager" "backend"
          cleanup_package "spotify-library-manager-frontend" "frontend"
          
          echo "✅ Cleanup completed"
