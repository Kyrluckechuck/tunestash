name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PYTHON_DEFAULT_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (lint + tests) • Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.13' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (backend)
        run: make lint-api

      - name: Tests (backend)
        run: make test-api

  frontend:
    name: Frontend (lint + tests) • Node ${{ env.NODE_VERSION }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install (frontend)
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint (frontend)
        working-directory: frontend
        run: yarn lint

      - name: Tests (frontend)
        working-directory: frontend
        run: yarn test:run

  docker-smoke-and-graphql:
    name: Docker smoke + GraphQL validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create temp dirs for volumes
        id: mktemp
        run: |
          CONFIG_DIR="${RUNNER_TEMP}/slm_config"
          MUSIC_DIR="${RUNNER_TEMP}/slm_music"
          mkdir -p "$CONFIG_DIR/db" "$MUSIC_DIR"
          echo "config-dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "music-dir=$MUSIC_DIR" >> "$GITHUB_OUTPUT"

      - name: Build and start stack
        env:
          SLM_CONFIG_DIR: ${{ steps.mktemp.outputs.config-dir }}
          MUSIC_DIR: ${{ steps.mktemp.outputs.music-dir }}
        run: |
          docker compose up --build -d

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5000/healthz > /dev/null; then
              echo "API healthy"; exit 0; fi; sleep 2; done; echo "API failed to become healthy"; docker compose logs web; exit 1

      - name: Set up Node ${{ env.NODE_VERSION }} for GraphQL validation
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install (frontend) for validation
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Validate GraphQL schema and operations
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000/graphql
        run: |
          yarn validate:comprehensive

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  docker-build-and-push:
    name: Docker build and push (GHCR)
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:latest
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_DEV_DEPS=false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:latest
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    # Run on all PRs, regardless of source branch
    branches: [ '**' ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-lint:
    name: Backend Lint (Py 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint API
        run: make lint-api

  backend-test:
    name: Backend Tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.13' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run API tests
        env:
          # Ensure tests use a local DB path, not /config
          DJANGO_DB_PATH: ${{ runner.temp }}/db/test.sqlite3
        run: make test-api

  frontend-lint:
    name: Frontend Lint (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint frontend
        run: yarn lint

  frontend-test:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:run

  docker-smoke-and-graphql:
    name: Docker Smoke + GraphQL Validation
    runs-on: ubuntu-latest
    # Build/push doesn't need to wait for other jobs, but can run in parallel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          REPO_OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner=${REPO_OWNER_LOWER}" >> $GITHUB_OUTPUT
          echo "sha_tag=ghcr.io/${REPO_OWNER_LOWER}/spotify-library-manager:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "sha_tag_frontend=ghcr.io/${REPO_OWNER_LOWER}/spotify-library-manager-frontend:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "latest_tag=ghcr.io/${REPO_OWNER_LOWER}/spotify-library-manager:latest" >> $GITHUB_OUTPUT
          echo "latest_tag_frontend=ghcr.io/${REPO_OWNER_LOWER}/spotify-library-manager-frontend:latest" >> $GITHUB_OUTPUT

      - name: Build API/worker image (cache and load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image (cache and load locally)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: |
            ${{ steps.tags.outputs.sha_tag_frontend }}
            ${{ steps.tags.outputs.latest_tag_frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=/graphql

      - name: Create CI docker-compose override (expose API port)
        run: |
          cat > docker-compose.override.ci.yml <<'YML'
          version: '3.8'
          services:
            web:
              ports:
                - "5000:5000"
              environment:
                DJANGO_DB_PATH: /config/db/dev.sqlite3
          YML

      - name: Prepare volumes
        run: |
          mkdir -p "$RUNNER_TEMP/slm-config/db" "$RUNNER_TEMP/slm-music"

      - name: Compose up (detached)
        env:
          SLM_CONFIG_DIR: ${{ runner.temp }}/slm-config
          MUSIC_DIR: ${{ runner.temp }}/slm-music
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.ci.yml up -d --no-build
          docker compose ps

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5000/healthz >/dev/null; then
              echo "API healthy"; exit 0; fi; sleep 2; done
          echo "API did not become healthy in time"; docker compose logs web; exit 1

      - name: Setup Node.js (for GraphQL validation scripts)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install frontend deps (for scripts)
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Validate GraphQL schema and operations
        run: |
          node frontend/scripts/validate-schema.js
          node frontend/scripts/test-graphql-operations.js

      - name: Push images (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag_frontend }}
            ${{ steps.tags.outputs.latest_tag_frontend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=/graphql

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Backend Tests - Run in parallel with frontend
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy pytest pytest-cov pytest-asyncio
    
    - name: Run backend tests
      run: |
        cd api
        python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./api/coverage.xml
        flags: backend
        name: backend-coverage

  # Frontend Tests - Run in parallel with backend
  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Install dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Run frontend tests
      run: |
        cd frontend
        yarn test:run --coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # Type Checking - Run in parallel
  type-checking:
    runs-on: ubuntu-latest
    name: Type Checking
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Run backend type check
      run: |
        mypy api/src/ --config-file pyproject.toml
      env:
        PYTHONPATH: api/src
    
    - name: Run frontend type check
      run: |
        cd frontend
        yarn tsc --noEmit --project tsconfig.app.json

  # GraphQL Schema Validation - Run after tests
  graphql-validation:
    runs-on: ubuntu-latest
    name: GraphQL Schema Validation
    needs: [backend-tests, frontend-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Start API server
      run: |
        cd api
        python -m uvicorn src.main:app --host 0.0.0.0 --port 5000 &
        sleep 10  # Wait for server to start
    
    - name: Run GraphQL schema validation
      run: |
        cd frontend
        yarn validate-schema
    
    - name: Run GraphQL operations test
      run: |
        cd frontend
        yarn test:graphql-operations

  # Linting and Formatting - Run in parallel
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black isort
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Run Python linting
      run: |
        flake8 api/src/ --max-line-length=88 --extend-ignore=E203,W503
        black --check api/src/
        isort --check-only api/src/
    
    - name: Run frontend linting
      run: |
        cd frontend
        yarn lint
        yarn format:check

  # Build and Security - Run after all tests pass
  build-and-security:
    runs-on: ubuntu-latest
    name: Build and Security
    needs: [backend-tests, frontend-tests, type-checking, graphql-validation, code-quality]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety bandit
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Security scan Python dependencies
      run: |
        safety check --json --output safety-report.json || true
        bandit -r api/src/ -f json -o bandit-report.json || true
    
    - name: Security scan Node.js dependencies
      run: |
        cd frontend
        yarn audit --audit-level moderate || true
    
    - name: Build frontend
      run: |
        cd frontend
        yarn build
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          safety-report.json
          bandit-report.json
        if-no-files-found: ignore 
