name: CI Optimized

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # Job 1: Build and cache base images (runs first)
  # =============================================================================
  build-base-images:
    name: Build and cache base images
    runs-on: ubuntu-latest
    outputs:
      backend-cache-key: ${{ steps.backend-cache.outputs.cache-key }}
      frontend-cache-key: ${{ steps.frontend-cache.outputs.cache-key }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache backend base image
        id: backend-cache
        run: |
          # Create cache key based on requirements files
          BACKEND_CACHE_KEY="backend-base-$(sha256sum requirements.txt requirements-dev.txt | sha256sum | cut -d' ' -f1)"
          echo "cache-key=$BACKEND_CACHE_KEY" >> $GITHUB_OUTPUT
          
          # Build and push base image with cache
          docker buildx build \
            --target python-deps \
            --tag ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:base-${{ github.sha }} \
            --cache-from type=gha,scope=backend-base \
            --cache-to type=gha,scope=backend-base,mode=max \
            --push \
            .

      - name: Build and cache frontend base image
        id: frontend-cache
        run: |
          # Create cache key based on package files
          FRONTEND_CACHE_KEY="frontend-base-$(sha256sum frontend/package.json frontend/yarn.lock | sha256sum | cut -d' ' -f1)"
          echo "cache-key=$FRONTEND_CACHE_KEY" >> $GITHUB_OUTPUT
          
          # Build and push base image with cache
          docker buildx build \
            --target deps \
            --tag ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:base-${{ github.sha }} \
            --cache-from type=gha,scope=frontend-base \
            --cache-to type=gha,scope=frontend-base,mode=max \
            --push \
            ./frontend

  # =============================================================================
  # Job 2: Backend tests (runs in parallel with frontend)
  # =============================================================================
  backend:
    name: Backend (lint + tests) • Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: build-base-images
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_spotify_library_manager
          POSTGRES_USER: slm_user
          POSTGRES_PASSWORD: slm_dev_password
        options: >-
          --health-cmd="pg_isready -U slm_user -d test_spotify_library_manager"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.13' ]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Collect static files
        working-directory: api
        run: python manage.py collectstatic --noinput || echo "Static file collection failed - continuing with tests"

      - name: Lint (backend)
        run: make lint-api

      - name: Tests (backend)
        env:
          DJANGO_SETTINGS_MODULE: test_settings
          TMPDIR: /tmp/pytest-${{ github.run_id }}-py${{ matrix.python-version }}
          HOME: /tmp/pytest-home-${{ github.run_id }}-py${{ matrix.python-version }}
        run: |
          mkdir -p "$TMPDIR" "$HOME"
          make test-api

  # =============================================================================
  # Job 3: Frontend tests (runs in parallel with backend)
  # =============================================================================
  frontend:
    name: Frontend (lint + tests) • Node 20
    runs-on: ubuntu-latest
    needs: build-base-images
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint (frontend)
        working-directory: frontend
        run: yarn lint

      - name: Tests (frontend)
        working-directory: frontend
        run: yarn test:run

  # =============================================================================
  # Job 4: Code quality checks (runs in parallel)
  # =============================================================================
  code-quality:
    name: Code quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check trailing newlines
        run: python scripts/check-repo-newlines.py check

  # =============================================================================
  # Job 5: Docker integration tests (runs after base images are built)
  # =============================================================================
  docker-integration:
    name: Docker integration tests
    runs-on: ubuntu-latest
    needs: [build-base-images, backend, frontend, code-quality]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Create temp dirs for volumes
        id: mktemp
        run: |
          CONFIG_DIR="${RUNNER_TEMP}/slm_config"
          MUSIC_DIR="${RUNNER_TEMP}/slm_music"
          mkdir -p "$CONFIG_DIR/db" "$MUSIC_DIR"
          
          # Create minimal settings.yaml for CI
          cat > "$CONFIG_DIR/settings.yaml" << 'EOF'
          # Minimal CI configuration
          default:
            cookies_location: "/config/cookies.txt"
            final_path: "/mnt/music_spotify"
            ALBUM_TYPES_TO_DOWNLOAD:
              - single
              - album
              - compilation
            ALBUM_GROUPS_TO_IGNORE:
              - appears_on
          EOF
          
          echo "config-dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "music-dir=$MUSIC_DIR" >> "$GITHUB_OUTPUT"

      - name: Build images with cache
        run: |
          echo "🔨 Building backend image with cache..."
          docker buildx build \
            --target backend-prod \
            --tag local-backend:latest \
            --cache-from type=gha,scope=backend-base \
            --cache-from type=gha,scope=backend-app \
            --cache-to type=gha,scope=backend-app,mode=max \
            .
          
          echo "🔨 Building frontend image with cache..."
          docker buildx build \
            --target production \
            --tag local-frontend:latest \
            --cache-from type=gha,scope=frontend-base \
            --cache-from type=gha,scope=frontend-app \
            --cache-to type=gha,scope=frontend-app,mode=max \
            ./frontend
          
          echo "🏷️ Images built successfully:"
          docker images | grep -E "(local-backend|local-frontend)"

      - name: Build and start stack
        env:
          SLM_CONFIG_DIR: ${{ steps.mktemp.outputs.config-dir }}
          MUSIC_DIR: ${{ steps.mktemp.outputs.music-dir }}
          BACKEND_IMAGE: local-backend:latest
          FRONTEND_IMAGE: local-frontend:latest
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: "django-insecure-ci-testing-key"
          AUTH_SECRET_KEY: "ci-testing-auth-key"
          POSTGRES_DB: "spotify_library_manager"
          POSTGRES_USER: "slm_user"
          POSTGRES_PASSWORD: "slm_dev_password"
        run: |
          echo "Using backend image: $BACKEND_IMAGE"
          echo "Using frontend image: $FRONTEND_IMAGE"
          echo "Config dir: $SLM_CONFIG_DIR"
          echo "Music dir: $MUSIC_DIR"
          
          echo "=== Creating required directories ==="
          mkdir -p "${SLM_CONFIG_DIR}/db/data"
          echo "✅ Created PostgreSQL data directory"
          
          echo "=== Starting PostgreSQL first ==="
          docker compose up -d postgres
          echo "⏰ Waiting for PostgreSQL to be healthy..."
          
          for i in {1..30}; do
            if docker compose ps postgres | grep -q "healthy"; then
              echo "✅ PostgreSQL is healthy after ${i} attempts"
              break
            fi
            echo "⏳ PostgreSQL not ready yet (attempt $i/30)..."
            if [ $i -eq 15 ]; then
              echo "=== PostgreSQL Debug Info ==="
              docker compose ps postgres
              docker compose logs postgres
            fi
            sleep 2
          done
          
          if ! docker compose ps postgres | grep -q "healthy"; then
            echo "❌ PostgreSQL never became healthy"
            echo "=== Final PostgreSQL Debug Info ==="
            docker compose ps postgres
            docker compose logs postgres
            exit 1
          fi
          
          echo "=== Starting web container ==="
          docker compose up -d web

          echo "⏰ Waiting for web container to become healthy..."
          for i in {1..30}; do
            if docker compose ps web --format json | jq -r '.Status' | grep -q "healthy"; then
              echo "✅ Web container is healthy after ${i} attempts"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Web container failed to become healthy after 30 attempts"
              echo "=== Container logs ==="
              docker compose logs web
              exit 1
            fi
            echo "⏳ Web container not ready yet (attempt $i/30)..."
            sleep 2
          done

          echo "=== Starting frontend container ==="
          docker compose up -d frontend

          echo "⏰ Waiting for frontend container to become healthy..."
          for i in {1..30}; do
            if docker compose ps frontend --format json | jq -r '.Status' | grep -q "healthy"; then
              echo "✅ Frontend container is healthy after ${i} attempts"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Frontend container failed to become healthy after 30 attempts"
              echo "=== Container logs ==="
              docker compose logs frontend
              exit 1
            fi
            echo "⏳ Frontend container not ready yet (attempt $i/30)..."
            sleep 2
          done

      - name: Test API health endpoint
        run: |
          echo "Testing API health endpoint..."
          if curl -f http://localhost:5000/healthz; then
            echo "✅ API health endpoint is responding"
          else
            echo "❌ API health endpoint failed"
            exit 1
          fi

      - name: Set up Node 20 for GraphQL validation
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies for validation
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Validate GraphQL schema and operations
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000/graphql
        run: yarn validate:comprehensive

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # =============================================================================
  # Job 6: Build and publish Docker images (runs only on main branch)
  # =============================================================================
  docker-build-and-push:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend, code-quality, docker-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: backend-prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:latest
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:sha-${{ github.sha }}
          cache-from: type=gha,scope=backend-base
          cache-from: type=gha,scope=backend-app
          cache-to: type=gha,scope=backend-app,mode=max

      - name: Build and push frontend image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:latest
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:sha-${{ github.sha }}
          cache-from: type=gha,scope=frontend-base
          cache-from: type=gha,scope=frontend-app
          cache-to: type=gha,scope=frontend-app,mode=max
