name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# Note: Python and Node versions are hardcoded in jobs for clarity

jobs:
  backend:
    name: Backend (lint + tests) • Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_spotify_library_manager
          POSTGRES_USER: slm_user
          POSTGRES_PASSWORD: slm_dev_password
        options: >-
          --health-cmd="pg_isready -U slm_user -d test_spotify_library_manager"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.13' ]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Collect static files (for comprehensive testing)
        run: |
          cd api
          python manage.py collectstatic --noinput || echo "Static file collection failed - continuing with tests"

      - name: Lint (backend)
        run: make lint-api

      - name: Tests (backend)
        env:
          DJANGO_SETTINGS_MODULE: test_settings
          # Set unique temp dirs to avoid parallel execution conflicts
          TMPDIR: /tmp/pytest-${{ github.run_id }}
          HOME: /tmp/pytest-home-${{ github.run_id }}
        run: |
          mkdir -p "$TMPDIR" "$HOME"
          make test-api

  frontend:
    name: Frontend (lint + tests) • Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install (frontend)
        run: |
          echo "📁 Current working directory: $(pwd)"
          echo "📋 Repository root contents:"
          ls -la
          echo "📋 Frontend directory contents:"
          ls -la frontend/
          echo "🔍 Looking for yarn.lock files:"
          find . -name "yarn.lock" -type f
          echo "📦 Installing frontend dependencies..."
          cd frontend
          yarn install --frozen-lockfile

      - name: Lint (frontend)
        working-directory: frontend
        run: yarn lint

      - name: Tests (frontend)
        working-directory: frontend
        run: yarn test:run

  code-quality:
    name: Code quality checks (newlines + formatting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check trailing newlines
        run: python scripts/check-repo-newlines.py check

  docker-smoke-and-graphql:
    name: Docker smoke + GraphQL validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create temp dirs for volumes
        id: mktemp
        run: |
          CONFIG_DIR="${RUNNER_TEMP}/slm_config"
          MUSIC_DIR="${RUNNER_TEMP}/slm_music"
          mkdir -p "$CONFIG_DIR/db" "$MUSIC_DIR"
          echo "config-dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "music-dir=$MUSIC_DIR" >> "$GITHUB_OUTPUT"

      - name: Build and start stack
        env:
          SLM_CONFIG_DIR: ${{ steps.mktemp.outputs.config-dir }}
          MUSIC_DIR: ${{ steps.mktemp.outputs.music-dir }}
        run: |
          echo "🏗️ Building and starting Docker stack..."
          echo "📁 Config dir: $SLM_CONFIG_DIR"
          echo "🎵 Music dir: $MUSIC_DIR"
          echo "🐳 Starting containers with detailed output..."
          docker compose up --build -d
          
          echo "📊 Container status after startup:"
          docker compose ps
          
          echo "🔍 Waiting for containers to settle..."
          sleep 10
          
          echo "📊 Container status after settling:"
          docker compose ps

      - name: Debug container startup
        if: always()
        run: |
          echo "🔍 === CONTAINER DEBUGGING ==="
          echo "📊 All container statuses:"
          docker compose ps
          
          echo ""
          echo "🏥 Container health details:"
          docker inspect --format='{{.State.Health.Status}}: {{range .State.Health.Log}}{{.Output}}{{end}}' $(docker compose ps -q web) || echo "No health info available"
          
          echo ""
          echo "📋 Web container logs (last 50 lines):"
          docker compose logs --tail=50 web
          
          echo ""
          echo "🔍 PostgreSQL container logs (last 20 lines):"
          docker compose logs --tail=20 postgres
          
          echo ""
          echo "🌐 Network connectivity test:"
          docker compose exec postgres pg_isready -h localhost -U slm_user -d spotify_library_manager || echo "PostgreSQL not ready"
          
          echo ""
          echo "🔍 Running comprehensive diagnostic (even if container is unhealthy):"
          docker compose exec web python scripts/debug_health_check.py || echo "Could not run comprehensive diagnostic - container may be dead"

      - name: Wait for API health (with detailed debugging)
        run: |
          echo "⏳ Waiting for API health with detailed monitoring..."
          for i in {1..60}; do
            echo "🔍 Attempt $i/60: Testing API health..."
            
            # Check container status
            WEB_STATUS=$(docker compose ps web --format=table | tail -1 | awk '{print $4}')
            echo "📊 Web container status: $WEB_STATUS"
            
            # Try comprehensive diagnostic script
            echo "🔍 Running comprehensive diagnostic script:"
            docker compose exec web python scripts/debug_health_check.py || echo "Comprehensive diagnostic failed"
            
            # Also try simple health check
            echo "🏥 Running simple health check script:"
            docker compose exec web python scripts/health_check.py || echo "Simple health check script failed"
            
            # Try curl
            echo "🌐 Testing HTTP endpoint:"
            if curl -v http://localhost:5000/healthz 2>&1; then
              echo "✅ API healthy on attempt $i"
              exit 0
            fi
            
            echo "⏸️ Waiting 3 seconds before next attempt..."
            sleep 3
          done
          
          echo "❌ API failed to become healthy after 60 attempts (3 minutes)"
          echo "🔍 Final debugging info:"
          docker compose ps
          docker compose logs web
          exit 1

      - name: Set up Node 20 for GraphQL validation
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install (frontend) for validation
        run: |
          echo "📁 Current working directory: $(pwd)"
          echo "📋 Repository root contents:"
          ls -la
          echo "📋 Frontend directory contents:"
          ls -la frontend/
          echo "🔍 Looking for yarn.lock files:"
          find . -name "yarn.lock" -type f
          echo "📦 Installing frontend dependencies for validation..."
          cd frontend
          yarn install --frozen-lockfile

      - name: Validate GraphQL schema and operations
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000/graphql
        run: |
          yarn validate:comprehensive

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  docker-build-and-push:
    name: Docker build and push (GHCR)
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:latest
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_DEV_DEPS=false

      - name: Build and push frontend image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:latest
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
