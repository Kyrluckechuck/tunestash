name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Backend Tests - Run in parallel with frontend
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy pytest pytest-cov pytest-asyncio
    
    - name: Run backend tests
      run: |
        cd api
        python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./api/coverage.xml
        flags: backend
        name: backend-coverage

  # Frontend Tests - Run in parallel with backend
  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Install dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Run frontend tests
      run: |
        cd frontend
        yarn test:run --coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # Type Checking - Run in parallel
  type-checking:
    runs-on: ubuntu-latest
    name: Type Checking
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Run backend type check
      run: |
        mypy api/src/ --config-file pyproject.toml
      env:
        PYTHONPATH: api/src
    
    - name: Run frontend type check
      run: |
        cd frontend
        yarn tsc --noEmit --project tsconfig.app.json

  # GraphQL Schema Validation - Run after tests
  graphql-validation:
    runs-on: ubuntu-latest
    name: GraphQL Schema Validation
    needs: [backend-tests, frontend-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Start API server
      run: |
        cd api
        python -m uvicorn src.main:app --host 0.0.0.0 --port 5000 &
        sleep 10  # Wait for server to start
    
    - name: Run GraphQL schema validation
      run: |
        cd frontend
        yarn validate-schema
    
    - name: Run GraphQL operations test
      run: |
        cd frontend
        yarn test:graphql-operations

  # Linting and Formatting - Run in parallel
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black isort
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Run Python linting
      run: |
        flake8 api/src/ --max-line-length=88 --extend-ignore=E203,W503
        black --check api/src/
        isort --check-only api/src/
    
    - name: Run frontend linting
      run: |
        cd frontend
        yarn lint
        yarn format:check

  # Build and Security - Run after all tests pass
  build-and-security:
    runs-on: ubuntu-latest
    name: Build and Security
    needs: [backend-tests, frontend-tests, type-checking, graphql-validation, code-quality]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'yarn'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety bandit
    
    - name: Install Node.js dependencies
      run: |
        cd frontend
        yarn install --frozen-lockfile
    
    - name: Security scan Python dependencies
      run: |
        safety check --json --output safety-report.json || true
        bandit -r api/src/ -f json -o bandit-report.json || true
    
    - name: Security scan Node.js dependencies
      run: |
        cd frontend
        yarn audit --audit-level moderate || true
    
    - name: Build frontend
      run: |
        cd frontend
        yarn build
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          safety-report.json
          bandit-report.json
        if-no-files-found: ignore 
