name: CI Optimized

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # Job 1: Backend tests (runs in parallel with frontend)
  # =============================================================================
  backend:
    name: Backend (lint + tests) • Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_tunestash
          POSTGRES_USER: slm_user
          POSTGRES_PASSWORD: slm_dev_password
        options: >-
          --health-cmd="pg_isready -U slm_user -d test_tunestash"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Collect static files
        working-directory: api
        run: python manage.py collectstatic --noinput || echo "Static file collection failed - continuing with tests"

      - name: Lint (backend)
        run: make lint-api

      - name: Tests (backend)
        env:
          DJANGO_SETTINGS_MODULE: test_settings
          TMPDIR: /tmp/pytest-${{ github.run_id }}-py${{ matrix.python-version }}
          HOME: /tmp/pytest-home-${{ github.run_id }}-py${{ matrix.python-version }}
        run: |
          mkdir -p "$TMPDIR" "$HOME"
          make test-api

  # =============================================================================
  # Job 2: Frontend tests (runs in parallel with backend)
  # =============================================================================
  frontend:
    name: Frontend (lint + tests) • Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: "frontend/yarn.lock"

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint (frontend)
        working-directory: frontend
        run: yarn lint

      - name: Tests (frontend)
        working-directory: frontend
        run: yarn test:run

  # =============================================================================
  # Job 3: Code quality checks (runs in parallel)
  # =============================================================================
  code-quality:
    name: Code quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check trailing newlines
        run: python scripts/check-repo-newlines.py check

  # =============================================================================
  # Job 4: Docker build and publish (runs in parallel with tests!)
  # =============================================================================
  docker-build:
    name: Docker build and publish
    runs-on: ubuntu-latest
    # No dependencies - starts immediately in parallel with tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # BuildKit automatically uses GitHub Actions cache via docker-bake.hcl
        # Caching strategy (configured in docker-bake.hcl):
        # 1. GitHub Actions cache (type=gha) - Fast, 10GB limit per repo
        # 2. Registry cache (type=registry) - No limits, persists across workflows
        # This caches yarn/pip dependencies, reducing build time significantly

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create temp dirs for volumes
        id: mktemp
        run: |
          CONFIG_DIR="${RUNNER_TEMP}/slm_config"
          MUSIC_DIR="${RUNNER_TEMP}/slm_music"
          mkdir -p "$CONFIG_DIR/db" "$MUSIC_DIR"

          # Create minimal settings.yaml for CI
          cat > "$CONFIG_DIR/settings.yaml" << 'EOF'
          # Minimal CI configuration
          default:
            cookies_location: "/config/youtube_music_cookies.txt"
            final_path: "/mnt/music_spotify"
            ALBUM_TYPES_TO_DOWNLOAD:
              - single
              - album
              - compilation
            ALBUM_GROUPS_TO_IGNORE:
              - appears_on
          EOF

          echo "config-dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "music-dir=$MUSIC_DIR" >> "$GITHUB_OUTPUT"

      - name: Extract branch name
        id: branch
        run: |
          # Get branch name and make it safe for Docker tags
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH=${GITHUB_REF#refs/heads/}
          fi
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "name=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "original=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Build and push images in parallel using docker-bake
        run: |
          # Set variables for docker-bake
          export REGISTRY="ghcr.io"
          export REPO_OWNER="${{ steps.owner.outputs.value }}"
          export SHA="${{ github.sha }}"
          export PLATFORMS="linux/amd64,linux/arm64"

          # Determine branch name for tagging
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            export BRANCH="main"
            echo "🚀 Main branch push - building production images"
          else
            export BRANCH="${{ steps.branch.outputs.name }}"
            echo "🔨 Building images for branch: $BRANCH"
          fi

          # Build and push both images in parallel using docker-bake
          echo "🚀 Building backend and frontend in parallel with docker-bake..."
          docker buildx bake --push

          echo "✅ Multi-arch images built and pushed successfully"
          echo "::notice title=Images Built::Backend: ghcr.io/$REPO_OWNER/tunestash:sha-$SHA"
          echo "::notice title=Images Built::Frontend: ghcr.io/$REPO_OWNER/tunestash-frontend:sha-$SHA"

  # =============================================================================
  # Job 5: Docker integration test (runs after tests AND build complete)
  # =============================================================================
  docker-test:
    name: Docker integration test
    runs-on: ubuntu-latest
    needs: [backend, frontend, code-quality, docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH=${GITHUB_REF#refs/heads/}
          fi
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "name=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Load pre-built images locally for testing
        run: |
          # Set variables for docker-bake
          export REGISTRY="ghcr.io"
          export REPO_OWNER="${{ steps.owner.outputs.value }}"
          export SHA="${{ github.sha }}"

          echo "📦 Loading pre-built images from cache for testing..."
          docker buildx bake local

          echo "✅ Images loaded for testing:"
          docker images | grep -E "(local-backend|local-frontend)"

      - name: Create temp dirs for volumes
        id: mktemp
        run: |
          CONFIG_DIR="${RUNNER_TEMP}/slm_config"
          MUSIC_DIR="${RUNNER_TEMP}/slm_music"
          mkdir -p "$CONFIG_DIR/db" "$MUSIC_DIR"

          # Create minimal settings.yaml for CI
          cat > "$CONFIG_DIR/settings.yaml" << 'EOF'
          # Minimal CI configuration
          default:
            cookies_location: "/config/youtube_music_cookies.txt"
            final_path: "/mnt/music_spotify"
            ALBUM_TYPES_TO_DOWNLOAD:
              - single
              - album
              - compilation
            ALBUM_GROUPS_TO_IGNORE:
              - appears_on
          EOF

          echo "config-dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "music-dir=$MUSIC_DIR" >> "$GITHUB_OUTPUT"

      - name: Build and start stack
        env:
          CI: "true"
          SLM_CONFIG_DIR: ${{ steps.mktemp.outputs.config-dir }}
          MUSIC_DIR: ${{ steps.mktemp.outputs.music-dir }}
          BACKEND_IMAGE: local-backend:latest
          FRONTEND_IMAGE: local-frontend:latest
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: "django-insecure-ci-testing-key"
          AUTH_SECRET_KEY: "ci-testing-auth-key"
          POSTGRES_DB: "tunestash"
          POSTGRES_USER: "slm_user"
          POSTGRES_PASSWORD: "slm_dev_password"
        run: |
          echo "Using backend image: $BACKEND_IMAGE"
          echo "Using frontend image: $FRONTEND_IMAGE"
          echo "Config dir: $SLM_CONFIG_DIR"
          echo "Music dir: $MUSIC_DIR"

          echo "=== Creating required directories ==="
          mkdir -p "${SLM_CONFIG_DIR}/db/data"
          echo "✅ Created PostgreSQL data directory"

          echo "=== Starting PostgreSQL first ==="
          docker compose up -d postgres
          echo "⏰ Waiting for PostgreSQL to be healthy..."

          for i in {1..45}; do
            if docker compose ps postgres | grep -q "healthy"; then
              echo "✅ PostgreSQL is healthy after ${i} attempts"
              break
            fi
            echo "⏳ PostgreSQL not ready yet (attempt $i/45)..."
            if [ $i -eq 20 ]; then
              echo "=== PostgreSQL Debug Info ==="
              docker compose ps postgres
              docker compose logs postgres
            fi
            sleep 3
          done

          if ! docker compose ps postgres | grep -q "healthy"; then
            echo "❌ PostgreSQL never became healthy"
            echo "=== Final PostgreSQL Debug Info ==="
            docker compose ps postgres
            docker compose logs postgres
            exit 1
          fi

          echo "=== Starting web container ==="
          docker compose up -d web

          echo "⏰ Waiting for web container to become healthy..."
          for i in {1..45}; do
            if docker compose ps web --format json | jq -r '.Status' | grep -q "healthy"; then
              echo "✅ Web container is healthy after ${i} attempts"
              break
            fi
            if [ $i -eq 45 ]; then
              echo "❌ Web container failed to become healthy after 45 attempts"
              echo "=== Container logs ==="
              docker compose logs web
              exit 1
            fi
            echo "⏳ Web container not ready yet (attempt $i/45)..."
            sleep 3
          done

          echo "=== Starting frontend container ==="
          docker compose up -d frontend

          echo "⏰ Waiting for frontend container to become healthy..."
          for i in {1..45}; do
            if docker compose ps frontend --format json | jq -r '.Status' | grep -q "healthy"; then
              echo "✅ Frontend container is healthy after ${i} attempts"
              break
            fi
            if [ $i -eq 45 ]; then
              echo "❌ Frontend container failed to become healthy after 45 attempts"
              echo "=== Container logs ==="
              docker compose logs frontend
              exit 1
            fi
            echo "⏳ Frontend container not ready yet (attempt $i/45)..."
            sleep 3
          done

      - name: Test API health endpoint
        run: |
          echo "Testing API health endpoint..."
          if curl -f http://localhost:5000/healthz; then
            echo "✅ API health endpoint is responding"
          else
            echo "❌ API health endpoint failed"
            exit 1
          fi

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v

      - name: Cleanup old branch images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 Cleaning up images for merged/deleted branches..."

          # Function to cleanup old images for a given package
          cleanup_package() {
            local PACKAGE_NAME=$1
            local IMAGE_TYPE=$2

            echo "📦 Cleaning up $IMAGE_TYPE images for package: $PACKAGE_NAME"

            # Get all package versions
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/user/packages/container/$PACKAGE_NAME/versions" \
              --paginate > /tmp/all_versions.json

            # Get all current branch names from the repository
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/branches" \
              --jq '.[].name' > /tmp/current_branches.txt

            # Extract branch images from package versions (both branch-* and direct branch names)
            # Excludes: latest, sha-*, buildcache, cache tags
            cat /tmp/all_versions.json | jq -r '
              .[] |
              select(.metadata.container.tags[]? | test("^branch-") or (test("^[a-z0-9._-]+$") and (. != "latest") and (test("^sha-") | not) and (. != "buildcache") and (. != "cache"))) |
              .metadata.container.tags[] |
              select(test("^branch-") or (test("^[a-z0-9._-]+$") and (. != "latest") and (test("^sha-") | not) and (. != "buildcache") and (. != "cache"))) |
              if test("^branch-") then sub("^branch-"; "") else . end
            ' | sort | uniq > /tmp/image_branches.txt

            # Find branches that have images but no longer exist in the repo
            comm -23 /tmp/image_branches.txt /tmp/current_branches.txt > /tmp/deleted_branches.txt

            # Clean up images for deleted branches
            while IFS= read -r branch_name; do
              if [ -n "$branch_name" ]; then
                echo "🗑️ Cleaning up images for deleted branch: $branch_name"

                # Get all image IDs for this deleted branch (check both branch-* and direct branch names)
                cat /tmp/all_versions.json | jq -r --arg branch "$branch_name" '
                  .[] |
                  select(.metadata.container.tags[]? == $branch or .metadata.container.tags[]? == ("branch-" + $branch)) |
                  .id
                ' > /tmp/to_delete.txt

                # Delete all images for this deleted branch
                while IFS= read -r image_id; do
                  if [ -n "$image_id" ]; then
                    echo "  🗑️ Deleting image ID: $image_id"
                    gh api \
                      -X DELETE \
                      -H "Accept: application/vnd.github+json" \
                      -H "X-GitHub-Api-Version: 2022-11-28" \
                      "/user/packages/container/$PACKAGE_NAME/versions/$image_id" || echo "Failed to delete image $image_id"
                  fi
                done < /tmp/to_delete.txt
              fi
            done < /tmp/deleted_branches.txt

            # Note: We intentionally don't clean up sha-* or latest tags here.
            # Those are managed by keeping the most recent builds.
            # This section only cleans up branch-specific images for active branches.
            while IFS= read -r branch_name; do
              if [ -n "$branch_name" ]; then
                echo "🔍 Cleaning up old images for active branch: $branch_name (keeping last 3)"

                # Get image IDs for this branch, sorted by creation date (oldest first)
                cat /tmp/all_versions.json | jq -r --arg branch "$branch_name" '
                  .[] |
                  select(.metadata.container.tags[]? == $branch or .metadata.container.tags[]? == ("branch-" + $branch)) |
                  .id as $id |
                  .created_at as $date |
                  [$date, $id] |
                  @tsv
                ' | sort | head -n -3 | cut -f2 > /tmp/to_delete.txt

                # Delete old images for this active branch
                while IFS= read -r image_id; do
                  if [ -n "$image_id" ]; then
                    echo "  🗑️ Deleting old image ID: $image_id"
                    gh api \
                      -X DELETE \
                      -H "Accept: application/vnd.github+json" \
                      -H "X-GitHub-Api-Version: 2022-11-28" \
                      "/user/packages/container/$PACKAGE_NAME/versions/$image_id" || echo "Failed to delete image $image_id"
                  fi
                done < /tmp/to_delete.txt
              fi
            done < /tmp/current_branches.txt

            rm -f /tmp/all_versions.json /tmp/current_branches.txt /tmp/image_branches.txt /tmp/deleted_branches.txt /tmp/to_delete.txt
          }

          # Cleanup both backend and frontend packages
          cleanup_package "tunestash" "backend"
          cleanup_package "tunestash-frontend" "frontend"

          echo "✅ Cleanup completed"
