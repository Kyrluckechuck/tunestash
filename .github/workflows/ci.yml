name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # Job 1: Backend tests
  # =============================================================================
  backend:
    name: Backend (lint + tests) • Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_tunestash
          POSTGRES_USER: slm_user
          POSTGRES_PASSWORD: slm_dev_password
        options: >-
          --health-cmd="pg_isready -U slm_user -d test_tunestash"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Collect static files
        working-directory: api
        run: python manage.py collectstatic --noinput || echo "Static file collection failed - continuing with tests"

      - name: Lint (backend)
        run: make lint-api

      - name: Tests (backend)
        env:
          DJANGO_SETTINGS_MODULE: test_settings
          TMPDIR: /tmp/pytest-${{ github.run_id }}-py${{ matrix.python-version }}
          HOME: /tmp/pytest-home-${{ github.run_id }}-py${{ matrix.python-version }}
        run: |
          mkdir -p "$TMPDIR" "$HOME"
          make test-api

  # =============================================================================
  # Job 2: Frontend tests
  # =============================================================================
  frontend:
    name: Frontend (lint + tests) • Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: "frontend/yarn.lock"

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint (frontend)
        working-directory: frontend
        run: yarn lint

      - name: Tests (frontend)
        working-directory: frontend
        run: yarn test:run

  # =============================================================================
  # Job 3: Code quality checks
  # =============================================================================
  code-quality:
    name: Code quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check trailing newlines
        run: python scripts/check-repo-newlines.py check

  # =============================================================================
  # Job 4: Docker build and publish
  # =============================================================================
  docker-build:
    name: Docker build and publish
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.backend-meta.outputs.tags }}
      frontend-image: ${{ steps.frontend-meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tunestash
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tunestash-frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend-prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # =============================================================================
  # Job 5: Docker integration test
  # =============================================================================
  docker-test:
    name: Docker integration test
    runs-on: ubuntu-latest
    needs: [backend, frontend, code-quality, docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images for testing
        run: |
          # Pull the SHA-tagged images we just built
          docker pull ghcr.io/${{ github.repository_owner }}/tunestash:sha-${{ github.sha }}
          docker pull ghcr.io/${{ github.repository_owner }}/tunestash-frontend:sha-${{ github.sha }}

          # Tag them for local use
          docker tag ghcr.io/${{ github.repository_owner }}/tunestash:sha-${{ github.sha }} local-backend:latest
          docker tag ghcr.io/${{ github.repository_owner }}/tunestash-frontend:sha-${{ github.sha }} local-frontend:latest

      - name: Verify images loaded
        run: |
          echo "✅ Images loaded for testing:"
          docker images | grep -E "(local-backend|local-frontend)"

      - name: Create temp dirs for volumes
        id: mktemp
        run: |
          CONFIG_DIR="${RUNNER_TEMP}/slm_config"
          MUSIC_DIR="${RUNNER_TEMP}/slm_music"
          mkdir -p "$CONFIG_DIR/db" "$MUSIC_DIR"

          cat > "$CONFIG_DIR/settings.yaml" << 'EOF'
          default:
            cookies_location: "/config/youtube_music_cookies.txt"
            final_path: "/mnt/music_spotify"
            ALBUM_TYPES_TO_DOWNLOAD:
              - single
              - album
              - compilation
            ALBUM_GROUPS_TO_IGNORE:
              - appears_on
          EOF

          echo "config-dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "music-dir=$MUSIC_DIR" >> "$GITHUB_OUTPUT"

      - name: Start stack and test
        env:
          CI: "true"
          SLM_CONFIG_DIR: ${{ steps.mktemp.outputs.config-dir }}
          MUSIC_DIR: ${{ steps.mktemp.outputs.music-dir }}
          BACKEND_IMAGE: local-backend:latest
          FRONTEND_IMAGE: local-frontend:latest
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: "django-insecure-ci-testing-key"
          AUTH_SECRET_KEY: "ci-testing-auth-key"
          POSTGRES_DB: "tunestash"
          POSTGRES_USER: "slm_user"
          POSTGRES_PASSWORD: "slm_dev_password"
        run: |
          mkdir -p "${SLM_CONFIG_DIR}/db/data"

          # Start postgres
          docker compose up -d postgres
          for i in {1..30}; do
            docker compose ps postgres | grep -q "healthy" && break
            sleep 2
          done

          # Start web
          docker compose up -d web
          for i in {1..30}; do
            docker compose ps web --format json | jq -r '.Status' | grep -q "healthy" && break
            sleep 2
          done

          # Test health endpoint
          curl -f http://localhost:5000/healthz
          echo "✅ API health check passed"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps || true

      - name: Tear down
        if: always()
        run: docker compose down -v

      - name: Cleanup old images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Simple cleanup: delete images for branches that no longer exist
          for pkg in tunestash tunestash-frontend; do
            echo "Cleaning $pkg..."

            # Get current branches
            gh api "/repos/${{ github.repository }}/branches" --jq '.[].name' > /tmp/branches.txt

            # Get package versions and delete orphaned branch tags
            gh api "/user/packages/container/$pkg/versions" --paginate 2>/dev/null | \
              jq -r '.[] | select(.metadata.container.tags | length > 0) |
                .metadata.container.tags[] | select(. != "latest" and (startswith("sha-") | not) and (. != "cache"))' | \
              sort -u > /tmp/image_tags.txt || true

            while read -r tag; do
              if ! grep -qx "$tag" /tmp/branches.txt 2>/dev/null; then
                echo "Deleting orphaned tag: $tag"
                # Find and delete the version with this tag
                gh api "/user/packages/container/$pkg/versions" --paginate 2>/dev/null | \
                  jq -r --arg tag "$tag" '.[] | select(.metadata.container.tags[] == $tag) | .id' | \
                  while read -r id; do
                    gh api -X DELETE "/user/packages/container/$pkg/versions/$id" 2>/dev/null || true
                  done
              fi
            done < /tmp/image_tags.txt
          done
          echo "✅ Cleanup done"
