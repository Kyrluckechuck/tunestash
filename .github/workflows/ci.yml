name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# Note: Python and Node versions are hardcoded in jobs for clarity

jobs:
  backend:
    name: Backend (lint + tests) • Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_spotify_library_manager
          POSTGRES_USER: slm_user
          POSTGRES_PASSWORD: slm_dev_password
        options: >-
          --health-cmd="pg_isready -U slm_user -d test_spotify_library_manager"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.13' ]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Collect static files
        working-directory: api
        run: python manage.py collectstatic --noinput || echo "Static file collection failed - continuing with tests"

      - name: Lint (backend)
        run: make lint-api

      - name: Tests (backend)
        env:
          DJANGO_SETTINGS_MODULE: test_settings
          # Set unique base temp dirs for each Python version
          TMPDIR: /tmp/pytest-${{ github.run_id }}-py${{ matrix.python-version }}
          HOME: /tmp/pytest-home-${{ github.run_id }}-py${{ matrix.python-version }}
        run: |
          mkdir -p "$TMPDIR" "$HOME"
          make test-api

  frontend:
    name: Frontend (lint + tests) • Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint (frontend)
        working-directory: frontend
        run: yarn lint

      - name: Tests (frontend)
        working-directory: frontend
        run: yarn test:run

  code-quality:
    name: Code quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check trailing newlines
        run: python scripts/check-repo-newlines.py check

  docker-integration:
    name: Docker integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create temp dirs for volumes
        id: mktemp
        run: |
          CONFIG_DIR="${RUNNER_TEMP}/slm_config"
          MUSIC_DIR="${RUNNER_TEMP}/slm_music"
          mkdir -p "$CONFIG_DIR/db" "$MUSIC_DIR"
          
          # Create minimal settings.yaml for CI
          cat > "$CONFIG_DIR/settings.yaml" << 'EOF'
          # Minimal CI configuration
          default:
            cookies_location: "/config/cookies.txt"
            final_path: "/mnt/music_spotify"
            ALBUM_TYPES_TO_DOWNLOAD:
              - single
              - album
              - compilation
            ALBUM_GROUPS_TO_IGNORE:
              - appears_on
          EOF
          
          echo "config-dir=$CONFIG_DIR" >> "$GITHUB_OUTPUT"
          echo "music-dir=$MUSIC_DIR" >> "$GITHUB_OUTPUT"

      - name: Extract branch name for image tags
        id: branch
        run: |
          # Get branch name and make it safe for Docker tags
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH=${{ github.head_ref }}
          else
            BRANCH=${GITHUB_REF#refs/heads/}
          fi
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "name=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          
      - name: Check if branch images exist
        id: check-images
        run: |
          BRANCH_TAG="${{ steps.branch.outputs.name }}"
          
          # Check backend image
          if docker manifest inspect ghcr.io/kyrluckechuck/spotify-library-manager:$BRANCH_TAG >/dev/null 2>&1; then
            echo "backend=ghcr.io/kyrluckechuck/spotify-library-manager:$BRANCH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "backend=ghcr.io/kyrluckechuck/spotify-library-manager:latest" >> "$GITHUB_OUTPUT"
          fi
          
          # Check frontend image
          if docker manifest inspect ghcr.io/kyrluckechuck/spotify-library-manager-frontend:$BRANCH_TAG >/dev/null 2>&1; then
            echo "frontend=ghcr.io/kyrluckechuck/spotify-library-manager-frontend:$BRANCH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=ghcr.io/kyrluckechuck/spotify-library-manager-frontend:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and start stack
        env:
          SLM_CONFIG_DIR: ${{ steps.mktemp.outputs.config-dir }}
          MUSIC_DIR: ${{ steps.mktemp.outputs.music-dir }}
          BACKEND_IMAGE: ${{ steps.check-images.outputs.backend }}
          FRONTEND_IMAGE: ${{ steps.check-images.outputs.frontend }}
          # Set required environment variables for container startup
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: "django-insecure-ci-testing-key"
          AUTH_SECRET_KEY: "ci-testing-auth-key"
          POSTGRES_DB: "spotify_library_manager"
          POSTGRES_USER: "slm_user"
          POSTGRES_PASSWORD: "slm_dev_password"
        run: |
          echo "Using backend image: $BACKEND_IMAGE"
          echo "Using frontend image: $FRONTEND_IMAGE"
          echo "Config dir: $SLM_CONFIG_DIR"
          echo "Music dir: $MUSIC_DIR"
          docker compose up --build -d
          echo "Waiting for containers to initialize (health check start period is 30s)..."
          sleep 35

      - name: Debug container startup
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo "=== Web Container Logs ==="
          docker compose logs web
          echo "=== PostgreSQL Container Logs ==="
          docker compose logs postgres
          echo "=== All Container Logs ==="
          docker compose logs

      - name: Wait for API health
        run: |
          echo "Waiting for Docker health checks to complete..."
          for i in {1..20}; do
            if docker compose ps --format json | jq -r '.[] | select(.Name | contains("web")) | .Status' | grep -q "healthy"; then
              echo "Web container healthy after $i attempts"
              break
            fi
            echo "Attempt $i/20: Web container not healthy yet..."
            sleep 3
          done
          
          echo "Final container status:"
          docker compose ps
          
          echo "Testing API endpoint directly..."
          for i in {1..10}; do
            if curl -s http://localhost:5000/healthz > /dev/null 2>&1; then
              echo "API endpoint responding after $i attempts"
              exit 0
            fi
            echo "Attempt $i/10: API endpoint not responding..."
            sleep 2
          done
          
          echo "API health check failed - showing logs:"
          docker compose logs web
          exit 1

      - name: Set up Node 20 for GraphQL validation
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies for validation
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Validate GraphQL schema and operations
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000/graphql
        run: yarn validate:comprehensive

      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  docker-build-and-push:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs: [ backend, frontend, code-quality, docker-integration ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:latest
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_DEV_DEPS=false

      - name: Build and push frontend image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:latest
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
