name: Build Branch Images

on:
  workflow_dispatch:

concurrency:
  group: build-branch-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-branch-images:
    name: Build and publish branch Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract branch name
        id: branch
        run: |
          # Get branch name and make it safe for Docker tags
          BRANCH=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "name=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "original=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:${{ steps.branch.outputs.name }}
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_DEV_DEPS=false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:${{ steps.branch.outputs.name }}
            ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "::notice title=Images Built::Backend: ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager:${{ steps.branch.outputs.name }}"
          echo "::notice title=Images Built::Frontend: ghcr.io/${{ steps.owner.outputs.value }}/spotify-library-manager-frontend:${{ steps.branch.outputs.name }}"
          echo "Built from branch: ${{ steps.branch.outputs.original }}"
