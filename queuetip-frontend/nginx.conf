server {
  listen       80;
  server_name  localhost;

  root   /usr/share/nginx/html;
  index  index.html;

  # Mirrors TuneStash's frontend/nginx.conf pattern: single-origin static
  # serve + proxy backend paths to the queuetip ASGI container on the Docker
  # network. Browser sees one origin → no CORS, cookies work, Spotify
  # redirect_uri matches the front-door host the user is on.

  # Proxy GraphQL API to the queuetip backend on the internal Docker network
  location /graphql {
    proxy_pass http://queuetip:5000/graphql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Auth routes: magic-link verify, signout, Spotify OAuth start + callback.
  # X-Forwarded-Host is critical — the backend uses it to build OAuth
  # redirect URIs that match the Spotify dashboard whitelist.
  location /auth/ {
    proxy_pass http://queuetip:5000/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # m3u snapshot downloads.
  location /exports/ {
    proxy_pass http://queuetip:5000/exports/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Backend healthcheck (so this container can verify end-to-end).
  location /health {
    proxy_pass http://queuetip:5000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
