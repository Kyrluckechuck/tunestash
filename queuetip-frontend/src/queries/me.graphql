query Me {
  me {
    id
    displayName
    createdAt
    isAdmin
    externalServices {
      service
      serviceUserId
      linkedAt
    }
  }
}

mutation InviteToQueuetip($email: String!) {
  inviteToQueuetip(email: $email) {
    sent
    message
  }
}

query MyInvitees {
  myInvitees {
    email
    addedAt
    hasSignedUp
    note
  }
}

mutation RemoveQueuetipInvite($email: String!) {
  removeQueuetipInvite(email: $email) {
    sent
    message
  }
}
