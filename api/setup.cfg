[flake8]
max-line-length = 88
extend-ignore = 
    # Allow lines slightly longer than 88 for strings and imports
    E501,
    # Line break before binary operator (conflicts with black)
    W503
select = E,W,F
exclude = 
    .venv,
    .pytest_cache,
    .mypy_cache,
    staticfiles,
    htmlcov,
    migrations,
    __pycache__
per-file-ignores = 
    # Migrations can have long lines
    */migrations/*.py:E501

[mypy]
python_version = 3.13
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
strict_optional = True

# Ignore untyped decorators from celery (no type stubs available)
[mypy-celery.*]
ignore_missing_imports = True

[mypy-celery_app]
ignore_missing_imports = True

[mypy-django_celery_results.*]
ignore_missing_imports = True

# Celery task files use @celery_app.task decorator which has no type stubs
# The functions themselves are typed, so we allow untyped decorators here
[mypy-library_manager.tasks.*]
disallow_untyped_decorators = False

[mypy-tests.*]
# Less strict for test files
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-scripts.*]
# Less strict for utility scripts
disallow_untyped_defs = False
