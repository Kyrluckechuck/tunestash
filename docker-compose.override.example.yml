version: '3.8'

services:
  web:
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - INSTALL_DEV_DEPS=true
      - POSTGRES_DB=${POSTGRES_DB:-spotify_library_manager_dev}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - SPOTDL_CACHE_PATH=/config/spotdl_cache
      - HOME=/config
      - XDG_DATA_HOME=/config/.local/share
      - XDG_CACHE_HOME=/config/.cache
    # Live code sync for backend (uvicorn --reload)
    command: bash -c "python manage.py migrate_from_sqlite && uvicorn src.main:app --host 0.0.0.0 --port 5000 --reload"
    volumes:
      - ./api:/app
      - ./requirements.txt:/app/requirements.txt
      - ./requirements-dev.txt:/app/requirements-dev.txt

  # Disable prod frontend port publishing in dev (we'll use Vite dev server below)
  frontend:
    ports: []

  # Frontend live dev server with HMR and file sync via bind mount
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      web:
        condition: service_healthy
    environment:
      - VITE_API_URL=/graphql
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-false}
    volumes:
      - ./frontend:/app
    command: sh -c "apk add --no-cache yarn && yarn install --frozen-lockfile && yarn dev --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    networks:
      - slm_net

# Override the named volume to bind to a host directory.
# By default, map container /config to host /config for dev.
# To use another path, set SLM_CONFIG_DIR in your environment or .env file.
volumes:
  config_storage:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${SLM_CONFIG_DIR:-/config}'
