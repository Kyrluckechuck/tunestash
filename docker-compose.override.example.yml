# Development Override File - Minimal Configuration
# This file only overrides what's absolutely necessary for development
# All other settings are inherited from the base docker-compose.yml

services:
  web:
    # Only override what's needed for development
    command: bash -c "pip install -r requirements.txt -r requirements-dev.txt && python manage.py migrate_from_sqlite && uvicorn src.main:app --host 0.0.0.0 --port 5000 --reload"
    environment:
      - INSTALL_DEV_DEPS=true
    volumes:
      - ./api:/app
      - ./requirements.txt:/app/requirements.txt
      - ./requirements-dev.txt:/app/requirements-dev.txt
      - python_packages:/app/.venv
      - pip_cache:/root/.cache/pip

  # Disable production frontend in development
  frontend:
    profiles: ["prod"]

  # Add development frontend server
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      web:
        condition: service_healthy
    environment:
      - VITE_API_URL=/graphql
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-false}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_yarn_cache:/usr/local/share/.cache/yarn
    command: sh -c "yarn install --frozen-lockfile && yarn dev --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    networks:
      - slm_net

volumes:
  frontend_node_modules:
  frontend_yarn_cache:
  python_packages:
  pip_cache:
