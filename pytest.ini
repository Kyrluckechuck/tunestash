[tool:pytest]
DJANGO_SETTINGS_MODULE = api.settings
python_files = tests.py test_*.py *_tests.py
testpaths = api/tests api/src/tests
addopts = 
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=api/src
    --cov=api/library_manager
    --cov-report=term-missing
    --cov-report=html
    --reuse-db
    --nomigrations
    --asyncio-mode=auto
    --django-db-keep
    --django-db-create
markers =
    unit: Unit tests
    integration: Integration tests
    graphql: GraphQL tests
    slow: Slow running tests 
    django_db: Django database tests
    db: Database tests
    asyncio: Async tests 
