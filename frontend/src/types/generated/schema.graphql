type Album {
  albumGroup: String
  albumType: String
  artist: String
  artistGid: String
  artistId: Int
  downloaded: Boolean!
  id: Int!
  name: String!
  spotifyGid: String!
  totalTracks: Int!
  wanted: Boolean!
}

type AlbumConnection {
  edges: [Album!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type Artist {
  addedAt: DateTime
  gid: String!
  id: Int!
  isTracked: Boolean!
  lastDownloaded: DateTime
  lastSynced: DateTime
  name: String!
  spotifyUri: String!
  undownloadedCount: Int!
}

type ArtistConnection {
  edges: [Artist!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type AuthenticationStatus {
  cookiesErrorMessage: String
  cookiesErrorType: String
  cookiesExpireInDays: Int
  cookiesValid: Boolean!
  poTokenConfigured: Boolean!
  poTokenErrorMessage: String
  poTokenValid: Boolean!
}

"""
The `DateTime` scalar type represents a date and time following the ISO 8601 standard.
"""
scalar DateTime

type DownloadHistory {
  completedAt: DateTime
  entityId: String!
  entityType: String!
  errorMessage: String
  id: String!
  startedAt: DateTime!
  status: DownloadStatus!
}

type DownloadProgress {
  entityId: String!
  entityType: String!
  message: String!
  progress: Float!
  status: DownloadStatus!
}

enum DownloadStatus {
  COMPLETED
  FAILED
  IN_PROGRESS
  PENDING
  SKIPPED
}

enum EntityType {
  ALBUM
  ARTIST
  PLAYLIST
  TRACK
}

type HistoryConnection {
  edges: [HistoryEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type HistoryEdge {
  cursor: String!
  node: DownloadHistory!
}

type Mutation {
  batchArtistOperations(artistIds: [Int!]!, operations: [String!] = null): MutationResult!
  cancelAllPendingTasks: MutationResult!
  cancelAllTasks: MutationResult!
  cancelRunningTasksByName(taskName: String!): MutationResult!
  cancelTasksByName(taskName: String!): MutationResult!
  createPlaylist(autoTrackArtists: Boolean! = false, name: String!, url: String!): Playlist!
  downloadAlbum(albumId: String!): Album!
  downloadArtist(artistId: String!): MutationResult!
  downloadUrl(autoTrackArtists: Boolean! = false, url: String!): MutationResult!
  setAlbumWanted(albumId: Int!, wanted: Boolean!): MutationResult!
  syncAllTrackedArtists: MutationResult!
  syncArtist(artistId: String!): Artist!
  syncPlaylist(force: Boolean! = false, playlistId: Int!): MutationResult!
  togglePlaylist(playlistId: Int!): MutationResult!
  togglePlaylistAutoTrack(playlistId: Int!): MutationResult!
  trackArtist(artistId: Int!): MutationResult!
  trackPlaylist(input: TrackPlaylistInput!): Playlist!
  untrackArtist(artistId: Int!): MutationResult!
  updateAlbum(input: UpdateAlbumInput!): Album!
  updateArtist(input: UpdateArtistInput!): Artist!
  updatePlaylist(autoTrackArtists: Boolean!, name: String!, playlistId: Int!, url: String!): MutationResult!
}

type MutationResult {
  album: Album
  artist: Artist
  message: String!
  playlist: Playlist
  success: Boolean!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type Playlist {
  autoTrackArtists: Boolean!
  enabled: Boolean!
  id: Int!
  lastSyncedAt: DateTime
  name: String!
  url: String!
}

type PlaylistConnection {
  edges: [Playlist!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type Query {
  album(id: String!): Album
  albums(after: String = null, artistId: Int = null, downloaded: Boolean = null, first: Int = 20, search: String = null, sortBy: String = null, sortDirection: String = null, wanted: Boolean = null): AlbumConnection!
  artist(id: String!): Artist
  artists(after: String = null, first: Int = 20, isTracked: Boolean = null, search: String = null, sortBy: String = null, sortDirection: String = null): ArtistConnection!
  downloadHistory(after: String = null, entityType: String = null, first: Int = 20, status: String = null): HistoryConnection!
  playlist(id: String!): Playlist
  playlists(after: String = null, enabled: Boolean = null, first: Int = 20, search: String = null, sortBy: String = null, sortDirection: String = null): PlaylistConnection!
  queueStatus: QueueStatus!
  song(id: String!): Song
  songs(after: String = null, artistId: Int = null, downloaded: Boolean = null, first: Int = 20, search: String = null, sortBy: String = null, sortDirection: String = null, unavailable: Boolean = null): SongConnection!
  systemHealth: SystemHealth!
  taskHistory(after: String = null, entityType: String = null, first: Int = 20, search: String = null, status: String = null, type: String = null): TaskHistoryConnection!
}

type QueueStatus {
  queueSize: Int!
  taskCounts: [TaskCount!]!
  totalPendingTasks: Int!
}

type Song {
  bitrate: Int!
  createdAt: DateTime!
  downloaded: Boolean!
  failedCount: Int!
  filePath: String
  gid: String!
  id: Int!
  name: String!
  primaryArtist: String!
  primaryArtistGid: String!
  primaryArtistId: Int!
  spotifyUri: String!
  unavailable: Boolean!
}

type SongConnection {
  edges: [Song!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type Subscription {
  allDownloadProgress: DownloadProgress!
  downloadProgress(entityId: String!): DownloadProgress!
}

type SystemHealth {
  authentication: AuthenticationStatus!
  canDownload: Boolean!
  downloadBlockerReason: String
}

type TaskCount {
  count: Int!
  taskName: String!
}

type TaskHistory {
  completedAt: DateTime
  durationSeconds: Int
  entityId: String!
  entityType: EntityType!
  id: String!
  logMessages: [String!]!
  progressPercentage: Float
  startedAt: DateTime!
  status: TaskStatus!
  taskId: String!
  type: TaskType!
}

type TaskHistoryConnection {
  edges: [TaskHistoryEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type TaskHistoryEdge {
  cursor: String!
  node: TaskHistory!
}

enum TaskStatus {
  CANCELLED
  COMPLETED
  FAILED
  PENDING
  RUNNING
}

enum TaskType {
  DOWNLOAD
  FETCH
  SYNC
}

input TrackPlaylistInput {
  autoTrackArtists: Boolean! = false
  playlistId: String!
}

input UpdateAlbumInput {
  albumId: String!
  isWanted: Boolean = null
}

input UpdateArtistInput {
  artistId: String!
  autoDownload: Boolean = null
  isTracked: Boolean = null
}
