query GetLibraryStats {
  libraryStats {
    # Tracked artists stats (primary focus)
    trackedArtists
    desiredSongs
    desiredDownloaded
    desiredMissing
    desiredFailed
    desiredUnavailable
    desiredCompletionPercentage
    desiredAlbums
    desiredAlbumsDownloaded
    desiredAlbumsPartial
    desiredAlbumsMissing
    desiredAlbumCompletionPercentage

    # Full library stats (secondary)
    totalArtists
    totalSongs
    downloadedSongs
    missingSongs
    failedSongs
    unavailableSongs
    totalAlbums
    downloadedAlbums
    partialAlbums
    missingAlbums
    songCompletionPercentage
    albumCompletionPercentage
  }
}

query GetFallbackMetrics($days: Int) {
  fallbackMetrics(days: $days) {
    totalAttempts
    totalSuccesses
    totalFailures
    successRate
    timeSeries {
      timestamp
      value
      count
    }
    failureReasons {
      reason
      count
    }
  }
}
