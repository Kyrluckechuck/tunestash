query GetArtist($id: String!) {
  artist(id: $id) {
    id
    name
    gid
    spotifyUri
    deezerId
    trackingTier
    addedAt
    lastSynced
    lastDownloaded
    undownloadedCount
    albumCount
    downloadedAlbumCount
    songCount
  }
}

query GetAlbum($id: String!) {
  album(id: $id) {
    id
    name
    spotifyGid
    deezerId
    totalTracks
    wanted
    downloaded
    albumType
    albumGroup
    artist
    artistId
    artistGid
  }
}

query GetAlbumById($id: Int!) {
  albumById(id: $id) {
    id
    name
    spotifyGid
    deezerId
    totalTracks
    wanted
    downloaded
    albumType
    albumGroup
    artist
    artistId
    artistGid
  }
}

query GetArtists(
  $trackingTier: Int
  $hasUndownloaded: Boolean
  $first: Int = 20
  $after: String
  $sortBy: String
  $sortDirection: String
  $search: String
) {
  artists(
    trackingTier: $trackingTier
    hasUndownloaded: $hasUndownloaded
    first: $first
    after: $after
    sortBy: $sortBy
    sortDirection: $sortDirection
    search: $search
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      id
      name
      gid
      spotifyUri
      deezerId
      trackingTier
      addedAt
      lastSynced
      lastDownloaded
      undownloadedCount
      failedSongCount
    }
  }
}

query GetAlbums(
  $artistId: Int
  $wanted: Boolean
  $downloaded: Boolean
  $first: Int = 20
  $after: String
  $sortBy: String
  $sortDirection: String
  $search: String
) {
  albums(
    artistId: $artistId
    wanted: $wanted
    downloaded: $downloaded
    first: $first
    after: $after
    sortBy: $sortBy
    sortDirection: $sortDirection
    search: $search
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      id
      name
      spotifyGid
      deezerId
      totalTracks
      wanted
      downloaded
      albumType
      albumGroup
      artist
      artistId
      artistGid
    }
  }
}

query GetPlaylists(
  $enabled: Boolean
  $first: Int = 20
  $after: String
  $sortBy: String
  $sortDirection: String
  $search: String
) {
  playlists(
    enabled: $enabled
    first: $first
    after: $after
    sortBy: $sortBy
    sortDirection: $sortDirection
    search: $search
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      id
      name
      url
      status
      statusMessage
      enabled
      autoTrackTier
      m3uEnabled
      lastSyncedAt
      provider
    }
  }
}

mutation SyncArtist($artistId: String!) {
  syncArtist(artistId: $artistId) {
    id
    name
    gid
    spotifyUri
    trackingTier
    addedAt
    lastSynced
    undownloadedCount
  }
}

mutation DownloadArtist($artistId: String!) {
  downloadArtist(artistId: $artistId) {
    success
    message
  }
}

mutation RetryFailedSongs($artistId: String!) {
  retryFailedSongs(artistId: $artistId) {
    success
    message
  }
}

mutation SyncPlaylist($playlistId: Int!) {
  syncPlaylist(playlistId: $playlistId) {
    success
    message
  }
}

mutation TrackArtist($artistId: Int!) {
  trackArtist(artistId: $artistId) {
    success
    message
    artist {
      id
      name
      trackingTier
    }
  }
}

mutation UntrackArtist($artistId: Int!) {
  untrackArtist(artistId: $artistId) {
    success
    message
    artist {
      id
      name
      trackingTier
    }
  }
}

mutation UpdateArtist($input: UpdateArtistInput!) {
  updateArtist(input: $input) {
    id
    name
    trackingTier
  }
}

mutation SetAlbumWanted($albumId: Int!, $wanted: Boolean!) {
  setAlbumWanted(albumId: $albumId, wanted: $wanted) {
    success
    message
    album {
      id
      name
      wanted
    }
  }
}

mutation DownloadAlbum($albumId: String!) {
  downloadAlbum(albumId: $albumId) {
    id
    name
    spotifyGid
    wanted
    downloaded
  }
}

mutation TogglePlaylist($playlistId: Int!) {
  togglePlaylist(playlistId: $playlistId) {
