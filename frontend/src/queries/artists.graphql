mutation UpdatePlaylist(
  $playlistId: Int!
  $name: String!
  $url: String!
  $autoTrackTier: Int
) {
  updatePlaylist(
    playlistId: $playlistId
    name: $name
    url: $url
    autoTrackTier: $autoTrackTier
  ) {
    success
    message
  }
}

mutation CreatePlaylist(
  $name: String!
  $url: String!
  $autoTrackTier: Int
) {
  createPlaylist(name: $name, url: $url, autoTrackTier: $autoTrackTier) {
    id
    name
    url
    status
    statusMessage
    enabled
    autoTrackTier
  }
}

query GetUnlinkedArtists(
  $first: Int
  $after: String
  $search: String
  $hasDownloads: Boolean
  $sortBy: String
  $sortDirection: String
) {
  unlinkedArtists(
    first: $first
    after: $after
    search: $search
    hasDownloads: $hasDownloads
    sortBy: $sortBy
    sortDirection: $sortDirection
  ) {
    edges {
      id
      name
      trackingTier
      songCount
      downloadedSongCount
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}

query PreviewDeezerArtist($deezerId: Int!) {
  previewDeezerArtist(deezerId: $deezerId) {
    deezerId
    name
    imageUrl
  }
}

mutation LinkArtistToDeezer($artistId: Int!, $deezerId: Int!) {
  linkArtistToDeezer(artistId: $artistId, deezerId: $deezerId) {
    success
    message
  }
}

