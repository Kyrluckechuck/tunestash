query GetArtist($id: String!) {
  artist(id: $id) {
    id
    name
    gid
    spotifyUri
    isTracked
    addedAt
    lastSynced
    lastDownloaded
    undownloadedCount
    albumCount
    downloadedAlbumCount
    songCount
  }
}

query GetAlbum($id: String!) {
  album(id: $id) {
    id
    name
    spotifyGid
    totalTracks
    wanted
    downloaded
    albumType
    albumGroup
    artist
    artistId
    artistGid
  }
}

query GetArtists(
  $isTracked: Boolean
  $hasUndownloaded: Boolean
  $first: Int = 20
  $after: String
  $sortBy: String
  $sortDirection: String
  $search: String
) {
  artists(
    isTracked: $isTracked
    hasUndownloaded: $hasUndownloaded
    first: $first
    after: $after
    sortBy: $sortBy
    sortDirection: $sortDirection
    search: $search
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      id
      name
      gid
      spotifyUri
      isTracked
      addedAt
      lastSynced
      lastDownloaded
      undownloadedCount
      failedSongCount
    }
  }
}

query GetAlbums(
  $artistId: Int
  $wanted: Boolean
  $downloaded: Boolean
  $first: Int = 20
  $after: String
  $sortBy: String
  $sortDirection: String
  $search: String
) {
  albums(
    artistId: $artistId
    wanted: $wanted
    downloaded: $downloaded
    first: $first
    after: $after
    sortBy: $sortBy
    sortDirection: $sortDirection
    search: $search
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      id
      name
      spotifyGid
      totalTracks
      wanted
      downloaded
      albumType
      albumGroup
      artist
      artistId
      artistGid
    }
  }
}

query GetPlaylists(
  $enabled: Boolean
  $first: Int = 20
  $after: String
  $sortBy: String
  $sortDirection: String
  $search: String
) {
  playlists(
    enabled: $enabled
    first: $first
    after: $after
    sortBy: $sortBy
    sortDirection: $sortDirection
    search: $search
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      id
      name
      url
      status
      statusMessage
      enabled
      autoTrackArtists
      lastSyncedAt
      provider
    }
  }
}

mutation SyncArtist($artistId: String!) {
  syncArtist(artistId: $artistId) {
    id
    name
    gid
    spotifyUri
    isTracked
    addedAt
    lastSynced
    undownloadedCount
  }
}

mutation DownloadArtist($artistId: String!) {
  downloadArtist(artistId: $artistId) {
    success
    message
  }
}

mutation RetryFailedSongs($artistId: String!) {
  retryFailedSongs(artistId: $artistId) {
    success
    message
  }
}

mutation SyncPlaylist($playlistId: Int!) {
  syncPlaylist(playlistId: $playlistId) {
    success
    message
  }
}

mutation TrackArtist($artistId: Int!) {
  trackArtist(artistId: $artistId) {
    success
    message
    artist {
      id
      name
      isTracked
    }
  }
}

mutation UntrackArtist($artistId: Int!) {
  untrackArtist(artistId: $artistId) {
    success
    message
    artist {
      id
      name
      isTracked
    }
  }
}

mutation SetAlbumWanted($albumId: Int!, $wanted: Boolean!) {
  setAlbumWanted(albumId: $albumId, wanted: $wanted) {
    success
    message
    album {
      id
      name
      wanted
    }
  }
}

mutation DownloadAlbum($albumId: String!) {
  downloadAlbum(albumId: $albumId) {
    id
    name
    spotifyGid
    wanted
    downloaded
  }
}

mutation TogglePlaylist($playlistId: Int!) {
  togglePlaylist(playlistId: $playlistId) {
    success
    message
    playlist {
      id
      name
      status
      statusMessage
      enabled
    }
  }
}

mutation ForceSyncPlaylist($playlistId: Int!) {
  syncPlaylist(playlistId: $playlistId, force: true) {
    success
    message
  }
}

mutation RecheckPlaylist($playlistId: Int!) {
  syncPlaylist(playlistId: $playlistId, recheck: true) {
    success
    message
    playlist {
      id
      name
      status
      statusMessage
      enabled
    }
  }
}

mutation TogglePlaylistAutoTrack($playlistId: Int!) {
  togglePlaylistAutoTrack(playlistId: $playlistId) {
    success
    message
    playlist {
      id
      name
      autoTrackArtists
    }
  }
}

mutation UpdatePlaylist(
  $playlistId: Int!
  $name: String!
  $url: String!
  $autoTrackArtists: Boolean!
) {
  updatePlaylist(
    playlistId: $playlistId
    name: $name
    url: $url
    autoTrackArtists: $autoTrackArtists
  ) {
    success
    message
  }
}

mutation CreatePlaylist(
  $name: String!
  $url: String!
  $autoTrackArtists: Boolean!
) {
  createPlaylist(name: $name, url: $url, autoTrackArtists: $autoTrackArtists) {
    id
    name
    url
    status
    statusMessage
    enabled
    autoTrackArtists
  }
}

mutation SyncAllTrackedArtists {
  syncAllTrackedArtists {
    success
    message
  }
}

mutation DownloadAllTrackedArtists {
  downloadAllTrackedArtists {
    success
    message
  }
}

mutation DownloadAllPlaylists {
  downloadAllPlaylists {
    success
    message
  }
}
