query GetSystemStatus {
  systemHealth {
    canDownload
    downloadBlockerReason
    authentication {
      cookiesValid
      cookiesErrorType
      cookiesExpireInDays
      poTokenConfigured
      spotifyUserAuthEnabled
      spotifyAuthMode
    }
    spotifyRateLimit {
      isRateLimited
      rateLimitedUntil
      secondsUntilClear
      windowCallCount
      windowMaxCalls
      windowUsagePercent
      burstCalls
      burstMax
      sustainedCalls
      sustainedMax
      hourlyCalls
      hourlyMax
    }
    storage {
      path
      exists
      isWritable
      availableGb
      usagePercent
      isLow
      isCriticallyLow
      errorMessage
    }
  }
  queueStatus {
    totalPendingTasks
    queueSize
  }
}

mutation DisconnectSpotify {
  disconnectSpotify {
    success
    message
  }
}
