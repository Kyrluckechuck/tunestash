query GetSystemStatus {
  systemHealth {
    canDownload
    downloadBlockerReason
    authentication {
      cookiesValid
      cookiesErrorType
      cookiesExpireInDays
      poTokenConfigured
      spotifyUserAuthEnabled
      spotifyAuthMode
    }
  }
  queueStatus {
    totalPendingTasks
    queueSize
  }
}

mutation DisconnectSpotify {
  disconnectSpotify {
    success
    message
  }
}
