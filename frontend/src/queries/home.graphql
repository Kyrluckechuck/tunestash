query GetSystemStatus {
  systemHealth {
    canDownload
    downloadBlockerReason
    authentication {
      cookiesValid
      cookiesErrorType
      cookiesExpireInDays
      poTokenConfigured
      spotifyUserAuthEnabled
      spotifyAuthMode
    }
    spotifyRateLimit {
      isRateLimited
      secondsUntilClear
      windowCallCount
      windowMaxCalls
      windowUsagePercent
    }
  }
  queueStatus {
    totalPendingTasks
    queueSize
  }
}

mutation DisconnectSpotify {
  disconnectSpotify {
    success
    message
  }
}
