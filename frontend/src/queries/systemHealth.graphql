query GetSystemHealth {
  systemHealth {
    canDownload
    downloadBlockerReason
    authentication {
      cookiesValid
      cookiesErrorType
      cookiesErrorMessage
      cookiesExpireInDays
      poTokenConfigured
      spotifyAuthMode
      spotifyTokenValid
      spotifyTokenExpired
      spotifyTokenExpiresInHours
      spotifyTokenErrorMessage
    }
  }
}
