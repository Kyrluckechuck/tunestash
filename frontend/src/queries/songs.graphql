query GetSongs(
  $page: Int = 1
  $pageSize: Int = 50
  $artistId: Int
  $albumId: Int
  $downloaded: Boolean
  $unavailable: Boolean
  $sortBy: String
  $sortDirection: String
  $search: String
  $maxBitrate: Int
) {
  songs(
    page: $page
    pageSize: $pageSize
    artistId: $artistId
    albumId: $albumId
    downloaded: $downloaded
    unavailable: $unavailable
    sortBy: $sortBy
    sortDirection: $sortDirection
    search: $search
    maxBitrate: $maxBitrate
  ) {
    items {
      id
      name
      gid
      deezerId
      primaryArtist
      primaryArtistId
      primaryArtistGid
      createdAt
      failedCount
      bitrate
      unavailable
      filePath
      downloaded
      spotifyUri
      downloadProvider
    }
    pageInfo {
      page
      pageSize
      totalPages
      totalCount
    }
  }
}

query GetSong($id: String!) {
  song(id: $id) {
    id
    name
    gid
    deezerId
    primaryArtist
    primaryArtistId
    createdAt
    failedCount
    bitrate
    unavailable
    filePath
    downloaded
    spotifyUri
    downloadProvider
  }
}
