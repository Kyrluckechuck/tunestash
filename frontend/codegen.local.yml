overwrite: true
# Use local schema file as source of truth (no running server needed!)
schema: 'src/types/generated/schema.graphql'
documents: 'src/**/*.{ts,tsx,graphql}'
generates:
  src/types/generated/graphql.ts:
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typed-document-node'
    config:
      # Apollo Client v4 recommended settings
      avoidOptionals:
        field: true
        inputValue: false
        object: false
      defaultScalarType: unknown
      skipTypename: false
      enumsAsTypes: true
      futureProofUnions: true
      maybeValue: T | null
      inputMaybeValue: T | null | undefined
      useTypeImports: true
      scalars:
        DateTime: string
