overwrite: true
schema: '${GRAPHQL_CODEGEN_ENDPOINT:-http://localhost:5000/graphql}'
documents: 'src/**/*.{ts,tsx,graphql}'
generates:
  src/types/generated/graphql.ts:
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typed-document-node'
    config:
      # Apollo Client v4 recommended settings
      avoidOptionals:
        field: true
        inputValue: false
        object: false
      defaultScalarType: unknown
      skipTypename: false
      enumsAsTypes: true
      futureProofUnions: true
      maybeValue: T | null
      inputMaybeValue: T | null | undefined
      useTypeImports: true
      scalars:
        DateTime: string
