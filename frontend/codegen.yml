overwrite: true
schema: '${GRAPHQL_CODEGEN_ENDPOINT:-http://localhost:5000/graphql}'
documents: 'src/**/*.{ts,tsx,graphql}'
generates:
  src/types/generated/graphql.ts:
    plugins:
      - 'typescript'
      - 'typescript-operations'
    config:
      skipTypename: true
      enumsAsTypes: true
      futureProofUnions: true
      avoidOptionals: false
      maybeValue: T | null
      inputMaybeValue: T | null | undefined
      scalars:
        DateTime: string
