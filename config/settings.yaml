# Django settings configuration
# This file is loaded by dynaconf in the Django settings

# Database configuration
DATABASES:
  default:
    ENGINE: django.db.backends.postgresql
    NAME: spotify_library_manager
    USER: slm_user
    PASSWORD: slm_dev_password
    HOST: localhost
    PORT: 5432
    OPTIONS:
      connect_timeout: 10

# Static files configuration
STATIC_URL: /static/
STATIC_ROOT: api/staticfiles

# Media files configuration
MEDIA_URL: /media/
MEDIA_ROOT: api/media

# Logging configuration
LOGGING:
  version: 1
  disable_existing_loggers: false
  formatters:
    verbose:
      format: "{levelname} {asctime} {module} {process:d} {thread:d} {message}"
      style: "{"
    simple:
      format: "{levelname} {message}"
      style: "{"
  handlers:
    console:
      class: logging.StreamHandler
      formatter: simple
  root:
    handlers: [console]
    level: INFO
  loggers:
    django:
      handlers: [console]
      level: WARNING
      propagate: false
    django.request:
      handlers: [console]
      level: WARNING
      propagate: false
    django.server:
      handlers: [console]
      level: WARNING
      propagate: false
    django.db.backends:
      handlers: [console]
      level: ERROR
      propagate: false
    huey:
      handlers: [console]
      level: WARNING
      propagate: false
    library_manager:
      handlers: [console]
      level: INFO
      propagate: false

# Huey configuration - commented out to use Django settings instead
# HUEY:
#   huey_class: huey.contrib.sql_huey.SqlHuey
#   name: spotify_library_manager
#   url: postgresql://slm_user:slm_dev_password@localhost:5432/spotify_library_manager
#   immediate: false
#   results: true
#   store_none: false

# Celery Configuration - Using PostgreSQL as broker via SQLAlchemy
CELERY_BROKER_URL: "sqlalchemy+postgresql://slm_user:slm_dev_password@localhost:5432/spotify_library_manager"
CELERY_RESULT_BACKEND: "django-db"
CELERY_ACCEPT_CONTENT: ["json"]
CELERY_TASK_SERIALIZER: "json"
CELERY_RESULT_SERIALIZER: "json"
CELERY_TIMEZONE: "UTC"
CELERY_TASK_TRACK_STARTED: true
CELERY_TASK_TIME_LIMIT: 3600
CELERY_BEAT_SCHEDULER: "django_celery_beat.schedulers:DatabaseScheduler"

# Custom configuration
cookies_location: /config/cookies.txt
po_token: null
log_level: INFO
no_lrc: false
overwrite: false
print_exceptions: true 
