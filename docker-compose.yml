networks:
  slm_net:
    name: slm_net

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tunestash}
      POSTGRES_USER: ${POSTGRES_USER:-slm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slm_dev_password}
    shm_size: 256m
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - slm_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-slm_user} -d ${POSTGRES_DB:-tunestash}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    command: >-
      valkey-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save ""
    volumes:
      - valkey_data:/data
    networks:
      - slm_net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 64M

  web:
    image: ${BACKEND_IMAGE:-ghcr.io/kyrluckechuck/tunestash:latest}
    environment:
      - CI=${CI:-false}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-only-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-5000}
      - POSTGRES_DB=${POSTGRES_DB:-tunestash}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://valkey:6379/0}
      - HOME=/config
      - TUNESTASH_SERVICE=web
    command: bash scripts/startup.sh
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    networks:
      - slm_net
    volumes:
      - config_storage:/config
      - music_storage:/mnt/music_spotify
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # Memory limits for API server
    deploy:
      resources:
        limits:
          memory: 2G # Hard limit for API server
        reservations:
          memory: 512M # Soft limit - guaranteed minimum

  queuetip:
    image: ${BACKEND_IMAGE:-ghcr.io/kyrluckechuck/tunestash:latest}
    environment:
      - CI=${CI:-false}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-only-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - POSTGRES_DB=${POSTGRES_DB:-tunestash}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://valkey:6379/0}
      - HOME=/config
      - TUNESTASH_SERVICE=queuetip
      - QUEUETIP_PUBLIC_URL=${QUEUETIP_PUBLIC_URL:-http://localhost:5050}
      - QUEUETIP_FRONTEND_URL=${QUEUETIP_FRONTEND_URL:-http://localhost:3001}
    command: uvicorn src.queuetip.app:app --host 0.0.0.0 --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "${QUEUETIP_PORT:-5050}:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    networks:
      - slm_net
    volumes:
      - config_storage:/config
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  queuetip-frontend:
    image: ${QUEUETIP_FRONTEND_IMAGE:-ghcr.io/kyrluckechuck/queuetip-frontend:latest}
    depends_on:
      queuetip:
        condition: service_healthy
    networks:
      - slm_net
    ports:
      - "${QUEUETIP_FRONTEND_PORT:-3001}:80"
    restart: unless-stopped

  frontend:
    # Nginx frontend service - serves static files and proxies API
    image: ${FRONTEND_IMAGE:-ghcr.io/kyrluckechuck/tunestash-frontend:latest}
    depends_on:
      web:
        condition: service_healthy
    networks:
      - slm_net
    ports:
      - "5000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    image: ${BACKEND_IMAGE:-ghcr.io/kyrluckechuck/tunestash:latest}
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-only-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - POSTGRES_DB=${POSTGRES_DB:-tunestash}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://valkey:6379/0}
      - HOME=/config
      - TUNESTASH_SERVICE=worker
    command: bash scripts/worker_startup.sh
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - config_storage:/config
      - music_storage:/mnt/music_spotify
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped
    networks:
      - slm_net
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 2G
    # privileged required to write to /proc/sys/vm/drop_caches for clearing page cache
    privileged: true
  beat:
    image: ${BACKEND_IMAGE:-ghcr.io/kyrluckechuck/tunestash:latest}
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-only-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - POSTGRES_DB=${POSTGRES_DB:-tunestash}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://valkey:6379/0}
      - HOME=/config
      - TUNESTASH_SERVICE=beat
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - config_storage:/config
      - music_storage:/mnt/music_spotify
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped
    networks:
      - slm_net
    # Memory limits for beat scheduler (lightweight)
    deploy:
      resources:
        limits:
          memory: 512M # Hard limit for beat scheduler
        reservations:
          memory: 128M # Soft limit - guaranteed minimum

volumes:
  valkey_data:
  config_storage:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${SLM_CONFIG_DIR:-/config}"
  music_storage:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${MUSIC_DIR:-/mnt/music_spotify}"
  postgres_data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      # You will need to ensure this directory exists in order to start the script
      device: "${SLM_CONFIG_DIR:-/config}/db/data"
