networks:
  slm_net:
    name: slm_net

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spotify_library_manager}
      POSTGRES_USER: ${POSTGRES_USER:-slm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slm_dev_password}
    volumes:
      - /config/db/postgres:/var/lib/postgresql/data
    networks:
      - slm_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slm_user} -d ${POSTGRES_DB:-spotify_library_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-only-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - HOST=0.0.0.0
      - PORT=5000
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-change-me-in-production}
      - INSTALL_DEV_DEPS=${INSTALL_DEV_DEPS:-false}
      - POSTGRES_DB=${POSTGRES_DB:-spotify_library_manager}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

      - SPOTDL_CACHE_PATH=/config/spotdl_cache
      - HOME=/config
      - XDG_DATA_HOME=/config/.local/share
      - XDG_CACHE_HOME=/config/.cache
    command: bash -c "
      echo '🚀 Starting web service...';
      echo '📊 Environment check:';
      echo 'Python version:' $(python --version);
      echo 'Working directory:' $(pwd);
      echo 'Available disk space:' $(df -h . | tail -1);
      echo '🗄️ Running migrations...';
      python manage.py migrate_from_sqlite --verbosity=2 && 
      echo '✅ Migrations complete. Starting server...';
      echo '🌐 Starting uvicorn server on 0.0.0.0:5000';
      uvicorn src.main:app --host 0.0.0.0 --port 5000 --log-level info --access-log
      "
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    networks:
      - slm_net
    volumes:
      - config_storage:/config
      - ${MUSIC_DIR:-/mnt/some_external_nas/music_spotify}:/mnt/music_spotify
      # Live code sync for development
      - ./api:/app
      - ./requirements.txt:/app/requirements.txt
      - ./requirements-dev.txt:/app/requirements-dev.txt
    # No host port published; reachable only on internal network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/graphql}
    image: ghcr.io/kyrluckechuck/spotify-library-manager-frontend:latest
    depends_on:
      web:
        condition: service_healthy
    networks:
      - slm_net
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: .
    image: ghcr.io/kyrluckechuck/spotify-library-manager:latest
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-spotify_library_manager}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - SPOTDL_CACHE_PATH=/config/spotdl_cache
      - HOME=/config
      - XDG_DATA_HOME=/config/.local/share
      - XDG_CACHE_HOME=/config/.cache
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - config_storage:/config
      - ${MUSIC_DIR:-/mnt/some_external_nas/music_spotify}:/mnt/music_spotify
      # Live code sync for development
      - ./api:/app
    restart: unless-stopped
    networks:
      - slm_net

  beat:
    build: .
    image: ghcr.io/kyrluckechuck/spotify-library-manager:latest
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-spotify_library_manager}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - SPOTDL_CACHE_PATH=/config/spotdl_cache
      - HOME=/config
      - XDG_DATA_HOME=/config/.local/share
      - XDG_CACHE_HOME=/config/.cache
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - config_storage:/config
      - ${MUSIC_DIR:-/mnt/some_external_nas/music_spotify}:/mnt/music_spotify
      # Live code sync for development
      - ./api:/app
    restart: unless-stopped
    networks:
      - slm_net

volumes:
  config_storage:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${SLM_CONFIG_DIR:-/config}'
