version: '3.8'

networks:
  slm_net:
    name: slm_net

services:
  web:
    build: .
    image: ghcr.io/kyrluckechuck/spotify-library-manager:latest
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-only-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - HOST=0.0.0.0
      - PORT=5000
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-change-me-in-production}
      - INSTALL_DEV_DEPS=${INSTALL_DEV_DEPS:-false}
      - DJANGO_DB_PATH=${DJANGO_DB_PATH:-/config/db/db.sqlite3}
    command: bash -c "python manage.py migrate && uvicorn src.main:app --host 0.0.0.0 --port 5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('http://localhost:5000/healthz').read().decode())"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - slm_net
    volumes:
      - config_storage:/config
      - ${MUSIC_DIR:-/mnt/some_external_nas/music_spotify}:/mnt/music_spotify
    # No host port published; reachable only on internal network
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/graphql}
    image: ghcr.io/kyrluckechuck/spotify-library-manager-frontend:latest
    depends_on:
      web:
        condition: service_healthy
    networks:
      - slm_net
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  worker:
    build: .
    image: ghcr.io/kyrluckechuck/spotify-library-manager:latest
    command: python manage.py run_huey
    volumes:
      - config_storage:/config
      - ${MUSIC_DIR:-/mnt/some_external_nas/music_spotify}:/mnt/music_spotify
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - slm_net

volumes:
  config_storage:
    name: config_storage
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${SLM_CONFIG_DIR:-/opt/configs/spotify_library_manager/}'
