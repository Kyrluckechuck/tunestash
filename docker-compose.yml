networks:
  slm_net:
    name: slm_net

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spotify_library_manager}
      POSTGRES_USER: ${POSTGRES_USER:-slm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slm_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - slm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slm_user} -d ${POSTGRES_DB:-spotify_library_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    image: ${BACKEND_IMAGE:-ghcr.io/kyrluckechuck/spotify-library-manager:latest}
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-only-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-5000}
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-change-me-in-production}
      - POSTGRES_DB=${POSTGRES_DB:-spotify_library_manager}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - HOME=/config
    command: bash scripts/startup.sh
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    networks:
      - slm_net
    volumes:
      - config_storage:/config
      - music_storage:/mnt/music_spotify

  frontend:
    # Nginx frontend service - serves static files and proxies API
    image: ${FRONTEND_IMAGE:-ghcr.io/kyrluckechuck/spotify-library-manager-frontend:latest}
    depends_on:
      web:
        condition: service_healthy
    networks:
      - slm_net
    ports:
      - "5000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    image: ${BACKEND_IMAGE:-ghcr.io/kyrluckechuck/spotify-library-manager:latest}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-spotify_library_manager}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - HOME=/config
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - config_storage:/config
      - music_storage:/mnt/music_spotify
    restart: unless-stopped
    networks:
      - slm_net

  beat:
    image: ${BACKEND_IMAGE:-ghcr.io/kyrluckechuck/spotify-library-manager:latest}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-spotify_library_manager}
      - POSTGRES_USER=${POSTGRES_USER:-slm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-slm_dev_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - HOME=/config
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - config_storage:/config
      - music_storage:/mnt/music_spotify
    restart: unless-stopped
    networks:
      - slm_net


volumes:
  config_storage:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${SLM_CONFIG_DIR:-/config}'
  music_storage:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '${MUSIC_DIR:-/mnt/music_spotify}'
  postgres_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      # You will need to ensure this directory exists in order to start the script
      device: '${SLM_CONFIG_DIR:-/config}/db/data'
